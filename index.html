// --- เพิ่มส่วนนี้ใน <script> เดิมของคุณ ---

// ตัวแปรเก็บค่าความดัน (จำลองการเก็บข้อมูล 1 วัน)
let bloodPressureData = {
    morning: [],
    evening: []
};

// ฟังก์ชันคำนวณค่าเฉลี่ยตามเกณฑ์ 2-2-7
function calculateAverage() {
    const allValues = [...bloodPressureData.morning, ...bloodPressureData.evening];
    if (allValues.length === 0) return { sys: 0, dia: 0 };

    const sumSys = allValues.reduce((a, b) => a + b.sys, 0);
    const sumDia = allValues.reduce((a, b) => a + b.dia, 0);
    
    return {
        sys: Math.round(sumSys / allValues.length),
        dia: Math.round(sumDia / allValues.length)
    };
}

// ฟังก์ชันแสดงผลลัพธ์พร้อมคำแนะนำภาษาชาวบ้าน
function updateDisplay() {
    const avg = calculateAverage();
    const resultElement = document.getElementById('avgResult');
    const adviceElement = document.getElementById('healthAdvice');

    if (avg.sys > 0) {
        resultElement.innerText = `${avg.sys}/${avg.dia}`;
        
        // ให้คำแนะนำตามสีไฟจราจร
        if (avg.sys < 135 && avg.dia < 85) {
            resultElement.className = "text-3xl font-bold text-green-400";
            adviceElement.innerText = "เยี่ยมมากค่ะ! ความดันอยู่ในเกณฑ์ดี รักษาสุขภาพแบบนี้ต่อไปนะ";
        } else if (avg.sys >= 140 || avg.dia >= 90) {
            resultElement.className = "text-3xl font-bold text-red-500";
            adviceElement.innerText = "ความดันเริ่มสูงแล้วนะคะ พักผ่อนให้พอและอย่าลืมทานยาตามสั่งค่ะ";
        } else {
            resultElement.className = "text-3xl font-bold text-yellow-400";
            adviceElement.innerText = "ความดันค่อนข้างสูงนิดหน่อย ระวังเรื่องอาหารเค็มด้วยนะคะ";
        }
    }
}
