<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HT Smart Control - OPD Takhli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .danger-glow { border: 2px solid #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
        .input-dark { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.75rem; padding: 0.6rem; width: 100%; color: white; outline: none; font-size: 12px; }
    </style>
</head>
<body class="p-4" onload="initApp()">

    <div class="max-w-md mx-auto space-y-4 pb-24">
        
        <!-- ส่วนหัว: Profile & Patient Safety -->
        <div class="glass-card rounded-3xl p-5 border-t-4 border-teal-500 space-y-3">
            <div class="flex justify-between items-start">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-slate-700 rounded-xl overflow-hidden border border-teal-500/50">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Khemika" alt="avatar">
                    </div>
                    <div>
                        <h2 class="text-md font-bold italic text-teal-400">HT SMART CONTROL</h2>
                        <p class="text-[10px]">พว. เขมิกา พงษ์ศรี | HN: 12345/69</p>
                    </div>
                </div>
                <div class="flex flex-col gap-1">
                    <button onclick="triggerScanner()" class="text-teal-400 border border-teal-400/30 px-2 py-1 rounded-lg text-[9px]">
                        <i class="fa-solid fa-qrcode mr-1"></i> สแกนข้อมูล
                    </button>
                    <button onclick="addMedManual()" class="text-slate-400 border border-slate-400/30 px-2 py-1 rounded-lg text-[9px]">
                        <i class="fa-solid fa-plus mr-1"></i> เพิ่มยา/ยาเหลือ
                    </button>
                </div>
            </div>

            <!-- ช่องบันทึกโรคประจำตัว -->
            <div class="space-y-1">
                <label class="text-[9px] text-slate-400 font-bold ml-1 uppercase">โรคประจำตัว (Comorbidity)</label>
                <input type="text" id="comorbidity" placeholder="เช่น DM, DLP, CKD..." class="input-dark" onchange="saveInfo()">
            </div>

            <!-- ช่องบันทึกการแพ้ยา (Allergy Section) -->
            <div class="space-y-1">
                <label class="text-[9px] text-red-400 font-bold ml-1 uppercase">ประวัติการแพ้ยา (Drug Allergy)</label>
                <input type="text" id="allergyInput" placeholder="ระบุชื่อยาที่แพ้ (ถ้ามี)..." class="input-dark border-red-500/30 focus:border-red-500" onchange="saveInfo()">
            </div>
        </div>

        <!-- รายการยาปัจจุบัน & ยาที่เหลือ (Medication List) -->
        <div id="medContainer" class="glass-card rounded-3xl p-4 hidden border-l-4 border-teal-400">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-[11px] font-bold text-teal-400 italic">CURRENT MEDICATION & REMAINING</h3>
                <span class="text-[8px] text-slate-400">*นำยาที่เหลือมาพบแพทย์*</span>
            </div>
            <div id="medList" class="space-y-2 max-h-48 overflow-y-auto pr-2"></div>
        </div>

        <!-- Trend Chart (4 Colors) -->
        <div class="glass-card rounded-3xl p-4">
            <button onclick="toggleGraph()" class="w-full flex justify-between items-center text-teal-300 font-semibold text-xs">
                <span><i class="fa-solid fa-chart-line mr-2"></i> สถิติแนวโน้ม (Control Chart)</span>
                <i id="graphIcon" class="fa-solid fa-chevron-down"></i>
            </button>
            <div id="graphSection" class="hidden mt-3 space-y-3">
                <div class="h-48 w-full"><canvas id="bpChart"></canvas></div>
                <div class="grid grid-cols-2 gap-y-1 text-[8px] border-t border-slate-800 pt-2 px-1">
                    <span class="flex items-center gap-1"><i class="fa-solid fa-circle text-red-500"></i> รพ. (OBP)</span>
                    <span class="flex items-center gap-1"><i class="fa-solid fa-circle text-[#4ade80]"></i> เฉลี่ยบ้าน-เช้า</span>
                    <span class="flex items-center gap-1"><i class="fa-solid fa-circle text-[#facc15]"></i> เฉลี่ยบ้าน-เย็น</span>
                    <span class="flex items-center gap-1 text-[#00ffff] font-bold italic">--- เป้าหมาย (135 mmHg)</span>
                </div>
            </div>
        </div>

        <!-- BP Recording (2-2-7) -->
        <div class="space-y-3">
            <div class="glass-card rounded-3xl p-4 border-l-4 border-teal-500">
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <div class="bg-slate-800/80 p-2 rounded-xl text-center border border-teal-500/20">
                        <p class="text-[8px] text-slate-400 uppercase">เฉลี่ยเช้า</p>
                        <p id="avgM" class="text-sm font-bold text-teal-400">--/--</p>
                    </div>
                    <div class="bg-slate-800/80 p-2 rounded-xl text-center border border-yellow-500/20">
                        <p class="text-[8px] text-slate-400 uppercase">เฉลี่ยเย็น</p>
                        <p id="avgE" class="text-sm font-bold text-yellow-400">--/--</p>
                    </div>
                </div>
                <div class="flex gap-2 p-1 bg-slate-800 rounded-xl mb-3">
                    <button onclick="setPeriod('morning')" id="btnM" class="w-1/2 py-1.5 rounded-lg bg-teal-600 text-white text-[10px]">ช่วงเช้า</button>
                    <button onclick="setPeriod('evening')" id="btnE" class="w-1/2 py-1.5 rounded-lg text-slate-400 text-[10px]">ช่วงเย็น</button>
                </div>
                <div class="flex gap-2 mb-3">
                    <input type="number" id="sysIn" placeholder="SYS" class="w-1/2 bg-slate-800 border border-slate-700 rounded-xl p-3 text-center text-white outline-none">
                    <input type="number" id="diaIn" placeholder="DIA" class="w-1/2 bg-slate-800 border border-slate-700 rounded-xl p-3 text-center text-white outline-none">
                </div>
                <button onclick="addRec('home')" class="w-full bg-teal-600 p-3 rounded-xl text-xs font-bold shadow-lg">บันทึกค่าบ้าน</button>
            </div>
            
            <button onclick="addRec('hospital')" class="w-full bg-red-600/20 border border-red-500/30 p-2 rounded-xl text-[10px] text-red-400 font-bold italic uppercase">+ บันทึกค่าโรงพยาบาล</button>
        </div>

        <!-- History & Delete Button -->
        <button onclick="toggleHistory()" class="w-full py-2 text-[10px] text-slate-500 italic"><i class="fa-solid fa-list-ul mr-1"></i> ตรวจสอบประวัติ/ลบข้อมูลผิด</button>
        <div id="historyList" class="hidden glass-card rounded-2xl p-4 text-[9px] max-h-48 overflow-y-auto space-y-2"></div>

    </div>

    <script>
        let db = { hospital: [], home_m: [], home_e: [], info: { com: "", alr: "", meds: [] } };
        let currentP = 'morning';
        let myChart;

        function initApp() {
            const saved = localStorage.getItem('ht_smart_v11');
            if(saved) db = JSON.parse(saved);
            document.getElementById('comorbidity').value = db.info.com || "";
            document.getElementById('allergyInput').value = db.info.alr || "";
            renderMeds();
            updateUI();
        }

        function saveInfo() {
            db.info.com = document.getElementById('comorbidity').value;
            db.info.alr = document.getElementById('allergyInput').value;
            localStorage.setItem('ht_smart_v11', JSON.stringify(db));
        }

        function triggerScanner() {
            const scanData = [
                { n: "Amlodipine (5mg)", r: "14" },
                { n: "Metformin (500mg)", r: "20" }
            ];
            scanData.forEach(m => db.info.meds.push({ id: Date.now()+Math.random(), n: m.n, r: m.r }));
            saveAndRefMed();
            alert("สแกนและดึงข้อมูลยาสำเร็จ!");
        }

        function addMedManual() {
            const name = prompt("ระบุชื่อยาและขนาด:");
            const rem = prompt("ระบุจำนวนเม็ดยาที่เหลือ:");
            if(name) {
                db.info.meds.push({ id: Date.now(), n: name, r: rem || "0" });
                saveAndRefMed();
            }
        }

        function saveAndRefMed() {
            localStorage.setItem('ht_smart_v11', JSON.stringify(db));
            renderMeds();
        }

        function renderMeds() {
            const cont = document.getElementById('medContainer');
            const list = document.getElementById('medList');
            if(db.info.meds.length > 0) {
                cont.classList.remove('hidden');
                list.innerHTML = db.info.meds.map((m, i) => `
                    <div class="flex justify-between items-center text-[10px] bg-slate-800/40 p-2 rounded-lg">
                        <span class="flex-1">${i+1}. <b>${m.n}</b></span>
                        <span class="text-orange-400 font-bold px-3">เหลือ: ${m.r} เม็ด</span>
                        <button onclick="delMed(${m.id})" class="text-red-500"><i class="fa-solid fa-circle-xmark"></i></button>
                    </div>
                `).join('');
            } else cont.classList.add('hidden');
        }

        function delMed(id) {
            db.info.meds = db.info.meds.filter(m => m.id !== id);
            saveAndRefMed();
        }

        function toggleGraph() {
            const sec = document.getElementById('graphSection');
            const icon = document.getElementById('graphIcon');
            sec.classList.toggle('hidden');
            icon.classList.toggle('fa-chevron-up');
            if(!sec.classList.contains('hidden')) renderChart();
        }

        function setPeriod(p) {
            currentP = p;
            document.getElementById('btnM').className = p === 'morning' ? "w-1/2 py-1.5 rounded-lg bg-teal-600 text-white text-[10px]" : "w-1/2 py-1.5 rounded-lg text-slate-400 text-[10px]";
            document.getElementById('btnE').className = p === 'evening' ? "w-1/2 py-1.5 rounded-lg bg-orange-600 text-white text-[10px]" : "w-1/2 py-1.5 rounded-lg text-slate-400 text-[10px]";
        }

        function addRec(type) {
            let sys, dia;
            if(type === 'hospital') {
                sys = prompt("SYS (Hospital):"); dia = prompt("DIA (Hospital):");
            } else {
                sys = document.getElementById('sysIn').value; dia = document.getElementById('diaIn').value;
            }
            if(sys && dia) {
                const entry = { id: Date.now(), s: parseInt(sys), d: parseInt(dia), date: new Date().toLocaleDateString('th-TH') };
                if(type === 'hospital') db.hospital.push(entry);
                else (currentP === 'morning' ? db.home_m : db.home_e).push(entry);
                localStorage.setItem('ht_smart_v11', JSON.stringify(db));
                updateUI();
                document.getElementById('sysIn').value = ''; document.getElementById('diaIn').value = '';
            }
        }

        function updateUI() {
            const c = (arr) => {
                const l = arr.slice(-7);
                if(!l.length) return "--/--";
                return Math.round(l.reduce((a,b)=>a+b.s,0)/l.length) + "/" + Math.round(l.reduce((a,b)=>a+b.d,0)/l.length);
            };
            document.getElementById('avgM').innerText = c(db.home_m);
            document.getElementById('avgE').innerText = c(db.home_e);
            if(!document.getElementById('graphSection').classList.contains('hidden')) renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('bpChart').getContext('2d');
            if(myChart) myChart.destroy();
            let labels = [...new Set([...db.hospital, ...db.home_m, ...db.home_e].map(x => x.date))].sort().slice(-7);
            if(!labels.length) labels = [new Date().toLocaleDateString('th-TH')];
            const getV = (arr, d) => {
                const f = arr.filter(x => x.date === d);
                return f.length ? f.reduce((a,b)=>a+b.s,0)/f.length : null;
            };
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'เป้าหมาย', data: Array(labels.length).fill(135), borderColor: '#00ffff', borderDash: [5, 5], pointRadius: 0, fill: false, order: 0 },
                        { label: 'รพ.', data: labels.map(l => getV(db.hospital, l)), borderColor: '#ef4444', backgroundColor: '#ef4444', pointStyle: 'rectRot', radius: 6, spanGaps: true, order: 1 },
                        { label: 'เช้า', data: labels.map(l => getV(db.home_m, l)), borderColor: '#4ade80', backgroundColor: '#4ade80', tension: 0.3, spanGaps: true, order: 2 },
                        { label: 'เย็น', data: labels.map(l => getV(db.home_e, l)), borderColor: '#facc15', backgroundColor: '#facc15', tension: 0.3, spanGaps: true, order: 3 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 90, max: 190, ticks: { size: 9, color: '#94a3b8' } } } }
            });
        }

        function toggleHistory() {
            const l = document.getElementById('historyList');
            l.classList.toggle('hidden');
            if(!l.classList.contains('hidden')) {
                const all = [...db.hospital.map(x=>({...x, t:'h', lbl:'รพ.'})), ...db.home_m.map(x=>({...x, t:'m', lbl:'เช้า'})), ...db.home_e.map(x=>({...x, t:'e', lbl:'เย็น'}))].sort((a,b)=>b.id-a.id);
                l.innerHTML = all.map(i => `<div class="flex justify-between items-center border-b border-slate-800 py-2"><span>[${i.lbl}] ${i.date}</span><div class="flex gap-3"><b>${i.s}/${i.d}</b><button onclick="delH('${i.t}', ${i.id})" class="text-red-500"><i class="fa-solid fa-trash-can"></i></button></div></div>`).join('');
            }
        }

        function delH(t, id) {
            if(confirm("ลบประวัตินี้?")) {
                const key = t==='h'?'hospital':(t==='m'?'home_m':'home_e');
                db[key] = db[key].filter(i => i.id !== id);
                localStorage.setItem('ht_smart_v11', JSON.stringify(db));
                updateUI(); toggleHistory(); toggleHistory();
            }
        }
    </script>
</body>
</html>
