<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takhli HT Smart Care</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; min-height: 100vh; transition: background 0.3s, color 0.3s; margin: 0; padding: 0; }
        .glass-card { border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.15); transition: all 0.3s; }
        
        /* 🌌 1. การตั้งค่าสไตล์สำหรับโหมดมืด (Dark Theme) */
        body.theme-dark { background: #0f172a; color: #f8fafc; }
        body.theme-dark .glass-card { background: rgba(30, 41, 59, 0.7); border-color: rgba(255, 255, 255, 0.1); color: #f8fafc; }
        body.theme-dark .header-block { background: #1e293b; border-bottom: 4px solid #2dd4bf; color: #f8fafc; }
        body.theme-dark .header-title { color: #2dd4bf; }
        body.theme-dark .input-profile { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.1); color: #2dd4bf; }
        body.theme-dark .input-comorbidity { background: rgba(45, 212, 191, 0.15); border-color: rgba(45, 212, 191, 0.5); color: #2dd4bf; }
        body.theme-dark .input-allergy { background: rgba(244, 63, 94, 0.15); border-color: rgba(244, 63, 94, 0.5); color: #fb7185; }
        body.theme-dark .btn-gradient { background: linear-gradient(90deg, #0d9488 0%, #2dd4bf 100%); }
        body.theme-dark .input-bp-box { background: rgba(255, 255, 255, 0.9); color: #0f172a; border: 2px solid #2dd4bf; }
        body.theme-dark .video-btn-active { background-color: rgba(45, 212, 191, 0.25); border-color: #2dd4bf; color: #2dd4bf; font-weight: bold; }

        /* 🌿 2. การตั้งค่าสไตล์สำหรับธีมสว่างธรรมชาติ (Green Theme) */
        body.theme-green { background: #eef2f3; color: #1e293b; }
        body.theme-green .glass-card { background: #ffffff; border-color: #e2e8f0; color: #1e293b; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        body.theme-green .header-block { background: #1e4620; color: #ffffff; box-shadow: 0 10px 30px rgba(30, 70, 32, 0.2); }
        body.theme-green .header-title { color: #a7f3d0; }
        body.theme-green .header-subtitle { color: #e2e8f0; }
        body.theme-green .input-profile { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.25); color: #ffffff; }
        body.theme-green .input-profile::placeholder { color: #cbd5e1; }
        body.theme-green .input-comorbidity { background: rgba(255, 255, 255, 0.15); border-color: #a7f3d0; color: #ffffff; }
        body.theme-green .input-comorbidity::placeholder { color: #cbd5e1; }
        body.theme-green .input-allergy { background: #fee2e2; border-color: #ef4444; color: #b91c1c; }
        body.theme-green .btn-gradient { background: linear-gradient(90deg, #1e4620 0%, #2e7d32 100%); }
        body.theme-green .input-bp-box { background: #f8fafc; color: #1e4620; border: 2px solid #1e4620; }
        body.theme-green .video-btn-active { background-color: rgba(46, 125, 50, 0.15); border-color: #1e4620; color: #1e4620; font-weight: bold; }

        /* 🌊 3. การตั้งค่าสไตล์สำหรับธีมฟ้าใสโมเดิร์น (Blue Theme) */
        body.theme-blue { background: #f0f4f8; color: #0f2c59; }
        body.theme-blue .glass-card { background: #ffffff; border-color: #dbeafe; color: #0f2c59; box-shadow: 0 10px 25px rgba(15, 44, 89, 0.05); }
        body.theme-blue .header-block { background: #0f2c59; color: #ffffff; box-shadow: 0 10px 30px rgba(15, 44, 89, 0.15); }
        body.theme-blue .header-title { color: #93c5fd; }
        body.theme-blue .header-subtitle { color: #e2e8f0; }
        body.theme-blue .input-profile { background: rgba(255, 255, 255, 0.12); border-color: rgba(255, 255, 255, 0.2); color: #ffffff; }
        body.theme-blue .input-profile::placeholder { color: #cbd5e1; }
        body.theme-blue .input-comorbidity { background: rgba(255, 255, 255, 0.12); border-color: #93c5fd; color: #ffffff; }
        body.theme-blue .input-comorbidity::placeholder { color: #cbd5e1; }
        body.theme-blue .input-allergy { background: #fee2e2; border-color: #ef4444; color: #b91c1c; }
        body.theme-blue .btn-gradient { background: linear-gradient(90deg, #0f2c59 0%, #1a73e8 100%); }
        body.theme-blue .input-bp-box { background: #f0fdfa; color: #0f2c59; border: 2px solid #1a73e8; }
        body.theme-blue .video-btn-active { background-color: rgba(26, 115, 232, 0.15); border-color: #0f2c59; color: #0f2c59; font-weight: bold; }
    </style>
</head>
<body class="theme-dark" onload="initApp()">

    <div class="header-block rounded-b-[2.5rem] p-6 text-center shadow-lg mb-4">
        <div class="flex justify-end items-center gap-1.5 text-[11px] mb-4 opacity-95">
            <span class="font-bold mr-1"><i class="fa-solid fa-palette"></i> สีแอป:</span>
            <button onclick="changeTheme('dark')" class="px-2 py-1 rounded-md bg-slate-800 text-slate-200 border border-slate-600 font-bold shadow-sm">🌌 มืด</button>
            <button onclick="changeTheme('green')" class="px-2 py-1 rounded-md bg-emerald-600 text-white font-bold shadow-sm">🌿 เขียว</button>
            <button onclick="changeTheme('blue')" class="px-2 py-1 rounded-md bg-blue-600 text-white font-bold shadow-sm">🌊 ฟ้า</button>
        </div>

        <h1 class="text-xl font-bold tracking-tight uppercase mb-1 header-title">Takhli HT Smart Care</h1>
        <p class="text-[11px] font-medium mb-4 header-subtitle">แอปพลิเคชันดูแลผู้ป่วยความดันโลหิตสูงอัจฉริยะ โรงพยาบาลตาคลี</p>
        
        <div class="flex items-center gap-4 py-4 border-y border-white/20 my-4 text-left max-w-md mx-auto">
            <div class="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center border border-white/20">
                <i class="fa-solid fa-address-card text-2xl"></i>
            </div>
            <div class="flex-1 space-y-2">
                <input type="text" id="patientHN" placeholder="ใส่ HN ผู้ป่วย..." class="input-profile font-bold italic" onchange="saveInfo()">
                <input type="text" id="patientName" placeholder="ระบุชื่อ-นามสกุล..." class="input-profile" onchange="saveInfo()">
            </div>
        </div>
        
        <div class="space-y-3 text-left max-w-md mx-auto">
            <input type="text" id="comorbidity" placeholder="โรคประจำตัว (Comorbidity)..." class="input-comorbidity text-sm" onchange="saveInfo()">
            <input type="text" id="allergyInput" placeholder="ประวัติแพ้ยา (Drug Allergy) *..." class="input-allergy text-sm" onchange="saveInfo()">
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 space-y-4 pb-12">
        
        <div class="glass-card rounded-[2rem] p-6 border-l-4 border-teal-500 space-y-4">
            <button onclick="toggleSection('medListArea', 'medToggleIcon')" class="flex justify-between items-center w-full text-sm font-bold uppercase italic">
                <span><i class="fa-solid fa-pills mr-1"></i> รายการยาปัจจุบัน</span>
                <i id="medToggleIcon" class="fa-solid fa-chevron-down text-[10px]"></i>
            </button>
            <div id="medListArea" class="hidden space-y-3">
                <button onclick="addMedManual()" class="w-full btn-gradient text-white py-3 rounded-xl text-xs font-bold shadow-md">
                    <i class="fa-solid fa-plus mr-1"></i> คลิกเพื่อพิมพ์เพิ่มรายการยาความดัน
                </button>
                <div id="medDisplayArea" class="space-y-2 mt-2"></div>
            </div>
        </div>

        <div class="glass-card rounded-[2rem] p-5 border-l-4 border-cyan-500">
            <button onclick="toggleSection('graphSection', 'graphIcon')" class="w-full flex justify-between items-center font-bold text-xs uppercase tracking-widest">
                <span><i class="fa-solid fa-chart-area mr-2"></i> สถิติแนวโน้ม (Trend Chart)</span>
                <i id="graphIcon" class="fa-solid fa-chevron-down transition-transform duration-300"></i>
            </button>
            <div id="graphSection" class="hidden mt-6 space-y-4">
                <div class="h-48 w-full"><canvas id="bpChart"></canvas></div>
                <div class="grid grid-cols-2 gap-2 text-[9px] border-t border-slate-700/30 pt-3">
                    <span class="flex items-center gap-2 font-bold"><i class="fa-solid fa-circle text-red-500"></i> รพ. (OBP)</span>
                    <span class="flex items-center gap-2 font-bold"><i class="fa-solid fa-circle text-[#4ade80]"></i> บ้าน (เช้า)</span>
                    <span class="flex items-center gap-2 font-bold"><i class="fa-solid fa-circle text-[#facc15]"></i> บ้าน (เย็น)</span>
                    <span class="flex items-center gap-2 font-bold text-cyan-400 italic">--- เป้าหมาย 135</span>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-[2rem] p-6 border-l-4 border-teal-500 space-y-5">
            <button onclick="toggleSection('bpResultSection', 'bpResultIcon')" class="w-full flex justify-between items-center font-bold text-xs uppercase tracking-widest">
                <span><i class="fa-solid fa-heart-pulse mr-2"></i> บันทึก & ผลความดันเฉลี่ย</span>
                <i id="bpResultIcon" class="fa-solid fa-chevron-down transition-transform duration-300"></i>
            </button>
            <div id="bpResultSection" class="hidden space-y-5 pt-2 text-center">
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-slate-800/10 p-4 rounded-2xl text-center border border-slate-400/20 shadow-inner">
                        <p class="text-[11px] uppercase font-bold tracking-wider mb-1">🌤️ เฉลี่ยเช้า (7 วัน)</p>
                        <p id="avgM" class="text-3xl font-extrabold text-green-500 font-mono tracking-tight">--/--</p>
                    </div>
                    <div class="bg-slate-800/10 p-4 rounded-2xl text-center border border-slate-400/20 shadow-inner">
                        <p class="text-[11px] uppercase font-bold tracking-wider mb-1">🌙 เฉลี่ยเย็น (7 วัน)</p>
                        <p id="avgE" class="text-3xl font-extrabold text-yellow-500 font-mono tracking-tight">--/--</p>
                    </div>
                </div>

                <div class="flex gap-2 p-1 bg-slate-900/10 rounded-2xl border border-slate-300/30">
                    <button onclick="setPeriod('morning')" id="btnM" class="flex-1 py-2.5 rounded-xl bg-teal-600 text-white text-xs font-bold transition-all">เช้า</button>
                    <button onclick="setPeriod('evening')" id="btnE" class="flex-1 py-2.5 rounded-xl text-slate-400 text-xs font-bold transition-all">เย็น</button>
                    <button onclick="setPeriod('hospital')" id="btnH" class="flex-1 py-2.5 rounded-xl text-slate-400 text-xs font-bold transition-all">รพ.</button>
                </div>
                
                <div class="flex gap-3">
                    <input type="number" id="sysIn" placeholder="ตัวบน (SYS)" class="w-1/2 input-bp-box rounded-2xl p-4 text-center text-2xl font-bold outline-none transition-all">
                    <input type="number" id="diaIn" placeholder="ตัวล่าง (DIA)" class="w-1/2 input-bp-box rounded-2xl p-4 text-center text-2xl font-bold outline-none transition-all">
                </div>
                
                <div id="evalArea" class="hidden p-4 rounded-2xl border text-left space-y-2 transition-all">
                    <div id="evalStatus" class="font-bold text-sm"></div>
                    <div id="evalAdvice" class="text-xs leading-relaxed opacity-90"></div>
                </div>

                <button onclick="addRecord()" class="w-full btn-gradient p-4 rounded-2xl text-sm font-bold shadow-xl tracking-widest uppercase text-white">บันทึกข้อมูล</button>
            </div>
        </div>

        <div class="glass-card rounded-[2rem] p-6 border-l-4 border-amber-500 space-y-4">
            <div class="flex justify-between items-center w-full text-xs font-bold uppercase tracking-widest">
                <span><i class="fa-solid fa-calendar-day mr-2"></i> วันนัดหมายครั้งต่อไป</span>
                <span id="countdownLabel" class="text-[10px] bg-amber-500/20 text-amber-500 px-2 py-0.5 rounded-lg font-bold">ยังไม่มีนัด</span>
            </div>
            <div class="space-y-3">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none opacity-60">
                        <i class="fa-solid fa-calendar-check text-sm"></i>
                    </div>
                    <input type="date" id="nextAppointDate" onchange="saveAppointment()" class="w-full input-bp-box rounded-xl py-3 pl-10 pr-4 text-sm font-bold outline-none transition">
                </div>
            </div>
        </div>

        <div class="glass-card rounded-[2rem] p-6 border-l-4 border-purple-500 space-y-4">
            <button onclick="toggleSection('videoGalleryArea', 'videoToggleIcon')" class="flex justify-between items-center w-full text-sm font-bold uppercase tracking-tight">
                <span><i class="fa-solid fa-video mr-1"></i> วิดีโอความรู้สุขศึกษาประชาชน</span>
                <i id="videoToggleIcon" class="fa-solid fa-chevron-down text-[10px]"></i>
            </button>
            <div id="videoGalleryArea" class="hidden space-y-4">
                
                <div class="relative w-full rounded-2xl overflow-hidden bg-black border border-slate-700/50 shadow-lg" style="padding-top: 56.25%;">
                    <iframe id="drivePlayer" class="absolute top-0 left-0 w-full h-full" src="https://drive.google.com/file/d/1w687K3ZpZunWj-E1m3y_pA3b-E-j17X1/preview" title="Google Drive Player" frameborder="0" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>

                <div class="flex justify-between items-center bg-purple-500/10 p-2.5 rounded-xl border border-purple-500/20 text-[11px]">
                    <span class="opacity-80 font-medium text-purple-400"><i class="fa-solid fa-circle-info mr-1"></i> กำลังฉายวิดีโอจากสมาคมฯ</span>
                    <button onclick="toggleSection('videoGalleryArea', 'videoToggleIcon')" class="bg-purple-600 hover:bg-purple-700 text-white px-2.5 py-1 rounded-md font-bold text-[10px] shadow-sm"><i class="fa-solid fa-circle-chevron-up mr-1"></i> ปิดหน้าต่างนี้</button>
                </div>

                <div class="space-y-1.5 max-h-60 overflow-y-auto pr-1 text-left">
                    <button id="vidBtn1" onclick="selectDriveVideo('1w687K3ZpZunWj-E1m3y_pA3b-E-j17X1', 'vidBtn1')" class="video-btn-active w-full text-left p-2.5 rounded-xl border border-slate-700/40 text-[11px] font-medium transition flex items-start gap-2">
                        <i class="fa-solid fa-circle-play mt-0.5 shrink-0"></i> <span>ตอนที่ 1: รู้จักกับโรคความดันโลหิตสูง</span>
                    </button>
                    <button id="vidBtn2" onclick="selectDriveVideo('1x_K3ZpZunWj-E1m3y_pA3b-E-j17X2', 'vidBtn2')" class="w-full text-left p-2.5 rounded-xl border border-slate-700/40 text-[11px] font-medium opacity-80 hover:opacity-100 transition flex items-start gap-2">
                        <i class="fa-solid fa-circle-play mt-0.5 shrink-0"></i> <span>ตอนที่ 2: การรับมือเมื่อเป็นโรคความดันโลหิตสูง</span>
                    </button>
                    <button id="vidBtn3" onclick="selectDriveVideo('1y_K3ZpZunWj-E1m3y_pA3b-E-j17X3', 'vidBtn3')" class="w-full text-left p-2.5 rounded-xl border border-slate-700/40 text-[11px] font-medium opacity-80 hover:opacity-100 transition flex items-start gap-2">
                        <i class="fa-solid fa-circle-play mt-0.5 shrink-0"></i> <span>ตอนที่ 3: แนวทางการรักษาโรคความดันโลหิตสูง</span>
                    </button>
                    <button id="vidBtn4" onclick="selectDriveVideo('1z_K3ZpZunWj-E1m3y_pA3b-E-j17X4', 'vidBtn4')" class="w-full text-left p-2.5 rounded-xl border border-slate-700/40 text-[11px] font-medium opacity-80 hover:opacity-100 transition flex items-start gap-2">
                        <i class="fa-solid fa-circle-play mt-0.5 shrink-0"></i> <span>ตอนที่ 4: โรคแทรกซ้อนที่ควรระวัง</span>
                    </button>
                    <button id="vidBtn5" onclick="selectDriveVideo('2a_K3ZpZunWj-E1m3y_pA3b-E-j17X5', 'vidBtn5')" class="w-full text-left p-2.5 rounded-xl border border-slate-700/40 text-[11px] font-medium opacity-80 hover:opacity-100 transition flex items-start gap-2">
                        <i class="fa-solid fa-circle-play mt-0.5 shrink-0"></i> <span>ตอนที่ 5: อาหารกับโรคความดันโลหิตสูง</span>
                    </button>
                    <button id="vidBtn6" onclick="selectDriveVideo('2b_K3ZpZunWj-E1m3y_pA3b-E-j17X6', 'vidBtn6')" class="w-full text-left p-2.5 rounded-xl border border-slate-700/40 text-[11px] font-medium opacity-80 hover:opacity-100 transition flex items-start gap-2">
                        <i class="fa-solid fa-circle-play mt-0.5 shrink-0"></i> <span>ตอนที่ 6: ยากับโรคความดันโลหิตสูง</span>
                    </button>
                    <button id="vidBtn7" onclick="selectDriveVideo('2c_K3ZpZunWj-E1m3y_pA3b-E-j17X7', 'vidBtn7')" class="w-full text-left p-2.5 rounded-xl border border-slate-700/40 text-[11px] font-medium opacity-80 hover:opacity-100 transition flex items-start gap-2">
                        <i class="fa-solid fa-circle-play mt-0.5 shrink-0"></i> <span>ตอนที่ 7: ความเชื่อผิด ๆ เกี่ยวกับยาลดความดัน</span>
                    </button>
                    <button id="vidBtn8" onclick="selectDriveVideo('2d_K3ZpZunWj-E1m3y_pA3b-E-j17X8', 'vidBtn8')" class="w-full text-left p-2.5 rounded-xl border border-slate-700/40 text-[11px] font-medium opacity-80 hover:opacity-100 transition flex items-start gap-2">
                        <i class="fa-solid fa-circle-play mt-0.5 shrink-0"></i> <span>ตอนที่ 8: สถานการณ์โรคความดันในประเทศไทย</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-[2rem] p-6 border-l-4 border-slate-500 space-y-4">
            <button onclick="toggleSection('historyArea', 'historyToggleIcon')" class="flex justify-between items-center w-full text-sm font-bold uppercase tracking-tight">
                <span><i class="fa-solid fa-list-check mr-1"></i> ผลความดันทั้งหมด</span>
                <i id="historyToggleIcon" class="fa-solid fa-chevron-down text-[10px]"></i>
            </button>
            <div id="historyArea" class="hidden space-y-2 max-h-64 overflow-y-auto pr-1"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        let db = { hospital: [], home_m: [], home_e: [], info: { hn: "", name: "", com: "", alr: "", meds: [], app_date: "", current_theme: "dark" } };
        let currentP = 'morning';
        let myChart;

        function initApp() {
            const saved = localStorage.getItem('HT_V21_FINAL');
            if(saved) db = JSON.parse(saved);
            
            const activeTheme = db.info.current_theme || "dark";
            changeTheme(activeTheme);

            document.getElementById('patientHN').value = db.info.hn || "";
            document.getElementById('patientName').value = db.info.name || "";
            document.getElementById('comorbidity').value = db.info.com || "";
            document.getElementById('allergyInput').value = db.info.alr || "";
            
            if(db.info.app_date) {
                document.getElementById('nextAppointDate').value = db.info.app_date;
                calculateCountdown(db.info.app_date);
            }
            renderMeds();
            renderHistory();
            updateUI();
        }

        function changeTheme(themeName) {
            document.body.removeAttribute('class');
            document.body.className = "theme-" + themeName;
            db.info.current_theme = themeName;
            localStorage.setItem('HT_V21_FINAL', JSON.stringify(db));
            if (myChart) renderChart();
            updateVideoButtonsStyle();
        }

        // ฟังก์ชันระบบสลับไฟล์เล่นวิดีโอตรงในแอปพลิเคชัน 🚀
        function selectDriveVideo(fileId, btnId) {
            // ดึงไฟล์ preview ของสมาคมฯ ขึ้น iframe ทันที
            document.getElementById('drivePlayer').src = "https://drive.google.com/file/d/" + fileId + "/preview";
            
            // ล้างสีสถานะปุ่มเก่า
            document.querySelectorAll('#videoGalleryArea button').forEach(b => {
                b.classList.remove('video-btn-active');
                b.classList.add('opacity-80');
            });
            
            // ไฮไลท์ปุ่มตอนที่กำลังเลือกอยู่ให้เด่นชัด
            const activeBtn = document.getElementById(btnId);
            activeBtn.classList.add('video-btn-active');
            activeBtn.classList.remove('opacity-80');
        }

        function updateVideoButtonsStyle() {
            const activeBtn = document.querySelector('.video-btn-active');
            if(activeBtn) {
                activeBtn.classList.remove('video-btn-active');
                void activeBtn.offsetWidth;
                activeBtn.classList.add('video-btn-active');
            }
        }

        function saveAppointment() {
            const inputDate = document.getElementById('nextAppointDate').value;
            db.info.app_date = inputDate;
            localStorage.setItem('HT_V21_FINAL', JSON.stringify(db));
            calculateCountdown(inputDate);
        }

        function calculateCountdown(dateString) {
            const label = document.getElementById('countdownLabel');
            if(!dateString) { label.innerText = "ยังไม่มีนัด"; return; }
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const appointDate = new Date(dateString);
            appointDate.setHours(0, 0, 0, 0);

            const diffTime = appointDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays > 0) { label.innerText = `อีก ${diffDays} วันจะถึงนัด`; }
            else if (diffDays === 0) { label.innerText = "🚨 มีนัดวันนี้!"; }
            else { label.innerText = `เลยกำหนดนัดมา ${Math.abs(diffDays)} วัน`; }
        }

        function toggleSection(sectionId, iconId) {
            const sec = document.getElementById(sectionId);
            const icon = document.getElementById(iconId);
            const isHidden = sec.classList.toggle('hidden');
            if (icon) icon.style.transform = isHidden ? "rotate(0deg)" : "rotate(180deg)";
            if (sectionId === 'graphSection' && !isHidden) setTimeout(renderChart, 100);
        }

        function addMedManual() {
            const n = prompt("พิมพ์ชื่อยาความดันและขนาดมิลลิกรัม (เช่น Amlodipine 5mg):");
            if(n) { db.info.meds.push({ id: Date.now(), n: n, r: "0" }); saveMed(); }
        }

        function saveMed() { localStorage.setItem('HT_V21_FINAL', JSON.stringify(db)); renderMeds(); }

        function renderMeds() {
            const list = document.getElementById('medDisplayArea');
            list.innerHTML = db.info.meds.map((m, i) => `
                <div class="bg-slate-800/10 p-4 rounded-2xl border border-slate-400/20 flex justify-between items-center shadow-inner">
                    <div class="flex-1">
                        <p class="text-xs font-bold">${i+1}. ${m.n}</p>
                        <div class="flex items-center gap-2 mt-2">
                            <span class="text-[9px] opacity-70 font-bold">คงเหลือ:</span>
                            <input type="number" value="${m.r}" onchange="updateRem(${m.id}, this.value)" class="w-14 bg-slate-950 border border-slate-700 rounded text-center text-xs text-orange-400 font-bold outline-none">
                            <span class="text-[9px] opacity-70">เม็ด</span>
                        </div>
                    </div>
                    <button onclick="delMed(${m.id})" class="text-red-400/70 p-2"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `).join('');
        }

        function updateRem(id, val) { const m = db.info.meds.find(x => x.id === id); if(m) { m.r = val; saveMed(); } }
        function delMed(id) { if(confirm("ลบรายการยา?")) { db.info.meds = db.info.meds.filter(x => x.id !== id); saveMed(); } }

        function setPeriod(p) {
            currentP = p;
            document.querySelectorAll('#btnM, #btnE, #btnH').forEach(b => b.className = "flex-1 py-2.5 rounded-xl text-slate-400 text-xs font-bold");
            const activeId = p === 'morning' ? 'btnM' : (p === 'evening' ? 'btnE' : 'btnH');
            const color = p === 'hospital' ? 'bg-red-600 shadow-md shadow-red-900/20' : 'bg-teal-600 shadow-md shadow-teal-900/20';
            document.getElementById(activeId).className = `flex-1 py-2.5 rounded-xl ${color} text-white text-xs font-bold shadow-md transition-all`;
        }

        function addRecord() {
            const s = document.getElementById('sysIn').value, d = document.getElementById('diaIn').value;
            if(s && d) {
                const sys = parseInt(s);
                const dia = parseInt(d);
                const entry = { id: Date.now(), s: sys, d: dia, date: new Date().toLocaleDateString('th-TH'), t: currentP };
                if(currentP === 'morning') db.home_m.push(entry);
                else if(currentP === 'evening') db.home_e.push(entry);
                else db.hospital.push(entry);
                localStorage.setItem('HT_V21_FINAL', JSON.stringify(db));
                
                evaluateBP(sys, dia);
                updateUI(); renderHistory();
                document.getElementById('sysIn').value = ''; document.getElementById('diaIn').value = '';
            }
        }

        function evaluateBP(sys, dia) {
            const area = document.getElementById('evalArea');
            const status = document.getElementById('evalStatus');
            const advice = document.getElementById('evalAdvice');
            area.classList.remove('hidden');

            if (sys >= 180 || dia >= 110) {
                area.className = "p-4 rounded-2xl border border-red-500 bg-red-500/10 text-left space-y-2 animate-pulse";
                status.className = "font-bold text-sm text-red-500 flex items-center gap-1";
                status.innerHTML = "<i class='fa-solid fa-triangle-exclamation'></i> วิกฤต สีแดง: ความดันสูงอันตรายมาก!";
                advice.innerHTML = "• นั่งพัก 5 นาทีแล้ววัดซ้ำ<br>• หากยังมีอาการ <strong>ปวดหัวรุนแรง ตาพร่ามัว แน่นหน้าอก ปากเบี้ยว หรือแขนขาอ่อนแรง</strong> ให้ไปตึกอุบัติเหตุ รพ.ตาคลี หรือโทร 1669 ทันทีค่ะ!";
            } else if (sys >= 140 || dia >= 90) {
                area.className = "p-4 rounded-2xl border border-orange-500 bg-orange-500/10 text-left space-y-2";
                status.className = "font-bold text-sm text-orange-400 flex items-center gap-1";
                status.innerHTML = "<i class='fa-solid fa-circle-exclamation'></i> สีส้ม: ความดันโลหิตสูง";
                advice.innerHTML = "• กินยาลดความดันตามแพทย์สั่งสม่ำเสมอ ห้ามขาด<br>• หลีกเลี่ยงแกงกะทิ ของมัน ของเค็มจัด ของดอง ขนมกรุบกรอบ";
            } else if ((sys >= 120 && sys <= 139) || (dia >= 80 && dia <= 89)) {
                area.className = "p-4 rounded-2xl border border-yellow-600 bg-yellow-500/10 text-left space-y-2";
                status.className = "font-bold text-sm text-yellow-600 flex items-center gap-1";
                status.innerHTML = "<i class='fa-solid fa-circle-info'></i> สีเหลือง: ความดันเริ่มสูงขึ้น";
                advice.innerHTML = "• เริ่มเตือนให้เฝ้าระวังตัว ลดการปรุงน้ำปลา ซอสซีอิ๊ว ในมื้ออาหาร<br>• ออกกำลังกายสม่ำเสมอ เช่น เดินเร็วต่อเนื่องอย่างน้อย 30 นาทีต่อวัน";
            } else {
                area.className = "p-4 rounded-2xl border border-green-500 bg-green-500/10 text-left space-y-2";
                status.className = "font-bold text-sm text-green-400 flex items-center gap-1";
                status.innerHTML = "<i class='fa-solid fa-circle-check'></i> สีเขียว: ความดันปกติ ดีเยี่ยม";
                advice.innerHTML = "• สุขภาพอยู่ในเกณฑ์ดีเยี่ยมค่ะ รักษาวินัยการกินและการปฏิบัติตัวต่อไปนะคะ";
            }
        }

        function deleteRecord(id, type) {
            if(confirm("คุณต้องการลบประวัติบันทึกความดันรายการนี้ใช่ไหมคะ?")) {
                if(type === 'hospital') db.hospital = db.hospital.filter(x => x.id !== id);
                else if(type === 'morning') db.home_m = db.home_m.filter(x => x.id !== id);
                else if(type === 'evening') db.home_e = db.home_e.filter(x => x.id !== id);
                
                localStorage.setItem('HT_V21_FINAL', JSON.stringify(db));
                updateUI();
                renderHistory();
                document.getElementById('evalArea').classList.add('hidden');
            }
        }

        function renderHistory() {
            const area = document.getElementById('historyArea');
            const all = [
                ...db.hospital.map(x=>({...x, lbl:'รพ.', c:'text-red-500', type:'hospital'})), 
                ...db.home_m.map(x=>({...x, lbl:'บ้าน(เช้า)', c:'text-green-500', type:'morning'})), 
                ...db.home_e.map(x=>({...x, lbl:'บ้าน(เย็น)', c:'text-yellow-500', type:'evening'}))
            ].sort((a,b)=>b.id-a.id);
            
            area.innerHTML = all.map(i => `
                <div class="flex justify-between items-center bg-slate-800/10 p-3 rounded-2xl border border-slate-400/20 mb-1">
                    <span class="text-[10px] font-bold ${i.c}">${i.lbl} [${i.date}]</span>
                    <div class="flex items-center gap-3">
                        <b class="text-sm font-mono">${i.s}/${i.d}</b>
                        <button onclick="deleteRecord(${i.id}, '${i.type}')" class="text-red-400/70 hover:text-red-600 px-1 py-0.5 text-xs">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                </div>
            `).join('') || '<p class="text-center text-[10px] opacity-60 py-4 italic">ยังไม่มีประวัติการบันทึก</p>';
        }

        function saveInfo() {
            db.info.hn = document.getElementById('patientHN').value;
            db.info.name = document.getElementById('patientName').value;
            db.info.com = document.getElementById('comorbidity').value;
            db.info.alr = document.getElementById('allergyInput').value;
            localStorage.setItem('HT_V21_FINAL', JSON.stringify(db));
        }

        function updateUI() {
            const calc = (arr) => {
                const last7 = arr.slice(-7);
                if(!last7.length) return "--/--";
                return Math.round(last7.reduce((a,b)=>a+b.s,0)/last7.length) + "/" + Math.round(last7.reduce((a,b)=>a+b.d,0)/last7.length);
            };
            document.getElementById('avgM').innerText = calc(db.home_m);
            document.getElementById('avgE').innerText = calc(db.home_e);
            if(!document.getElementById('graphSection').classList.contains('hidden')) renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('bpChart').getContext('2d');
            if(myChart) myChart.destroy();
            let labels = [...new Set([...db.hospital, ...db.home_m, ...db.home_e].map(x => x.date))].sort().slice(-7);
            if(!labels.length) labels = [new Date().toLocaleDateString('th-TH')];
            const getV = (arr, d) => { const f = arr.filter(x => x.date === d); return f.length ? f.reduce((a,b)=>a+b.s,0)/f.length : null; };
            
            const isDark = db.info.current_theme === 'dark';
            const tickColor = isDark ? '#94a3b8' : '#1e293b';

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'เป้าหมาย', data: Array(labels.length).fill(135), borderColor: '#22d3ee', borderDash: [5, 5], pointRadius: 0, fill: false },
                        { label: 'รพ.', data: labels.map(l => getV(db.hospital, l)), borderColor: '#ef4444', backgroundColor: '#ef4444', pointStyle: 'rectRot', radius: 7, spanGaps: true },
                        { label: 'เช้า', data: labels.map(l => getV(db.home_m, l)), borderColor: '#4ade80', backgroundColor: '#4ade80', tension: 0.3, spanGaps: true },
                        { label: 'เย็น', data: labels.map(l => getV(db.home_e, l)), borderColor: '#facc15', backgroundColor: '#facc15', tension: 0.3, spanGaps: true }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 90, max: 190, ticks: { size: 10, color: tickColor } }, x: { ticks: { size: 10, color: tickColor } } } }
            });
        }
    </script>
</body>
</html>
