<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart HT Dashboard - OPD Takhli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-md mx-auto space-y-6 pb-10">
        <!-- Header -->
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-teal-400">HT SMART</h1>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest">Digital Health Passport</p>
            </div>
            <div class="w-10 h-10 bg-teal-500 rounded-full flex items-center justify-center">
                <i class="fa-solid fa-stethoscope text-white"></i>
            </div>
        </div>

        <!-- Patient Profile -->
        <div class="glass-card rounded-3xl p-5 border-t-4 border-teal-500">
            <div class="flex items-center gap-4 mb-3">
                <div class="w-12 h-12 bg-slate-700 rounded-xl overflow-hidden border border-teal-400/30">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Khemika" alt="avatar">
                </div>
                <div>
                    <h2 class="text-md font-semibold">คุณเขมิกา พงษ์ศรี</h2>
                    <p class="text-[10px] text-slate-400 italic">เป้าหมาย: < 135/85 mmHg (HBPM)</p>
                </div>
            </div>
        </div>

        <!-- 2-2-7 Recording -->
        <div class="glass-card rounded-3xl p-6">
            <h3 class="text-sm font-semibold mb-4 text-teal-300 uppercase tracking-wider">
                <i class="fa-solid fa-heart-pulse mr-2"></i> บันทึกความดัน (สูตร 2-2-7)
            </h3>
            
            <div class="space-y-4">
                <!-- Select Period -->
                <div class="flex gap-2 p-1 bg-slate-800 rounded-xl">
                    <button onclick="setTime('morning')" id="btnMorning" class="w-1/2 py-2 rounded-lg bg-teal-600 text-white text-sm transition-all">ช่วงเช้า</button>
                    <button onclick="setTime('evening')" id="btnEvening" class="w-1/2 py-2 rounded-lg text-slate-400 text-sm transition-all">ช่วงเย็น</button>
                </div>

                <div class="flex gap-2">
                    <input type="number" id="sysIn" placeholder="ตัวบน" class="w-1/2 bg-slate-800 border border-slate-700 rounded-xl p-3 text-center text-white focus:border-teal-400 outline-none text-xl">
                    <input type="number" id="diaIn" placeholder="ตัวล่าง" class="w-1/2 bg-slate-800 border border-slate-700 rounded-xl p-3 text-center text-white focus:border-teal-400 outline-none text-xl">
                </div>
                <button onclick="addBPRecord()" class="w-full bg-teal-600 hover:bg-teal-500 p-3 rounded-xl font-bold transition-all shadow-lg">
                    บันทึกผล
                </button>
            </div>

            <!-- List of Records -->
            <div class="mt-6 grid grid-cols-2 gap-4 border-t border-slate-700 pt-4">
                <div>
                    <p class="text-[10px] text-teal-400 mb-2 font-bold"><i class="fa-solid fa-sun mr-1"></i> รายการเช้า</p>
                    <ul id="listMorning" class="text-[10px] space-y-1">
                        <li class="text-slate-600 italic font-light">ไม่มีข้อมูล</li>
                    </ul>
                </div>
                <div>
                    <p class="text-[10px] text-orange-400 mb-2 font-bold"><i class="fa-solid fa-moon mr-1"></i> รายการเย็น</p>
                    <ul id="listEvening" class="text-[10px] space-y-1">
                        <li class="text-slate-600 italic font-light">ไม่มีข้อมูล</li>
                    </ul>
                </div>
            </div>

            <!-- Double Average Summary -->
            <div id="resultBox" class="mt-6 grid grid-cols-2 gap-3 hidden">
                <div class="bg-slate-800/80 p-3 rounded-2xl border border-teal-500/30 text-center">
                    <p class="text-[9px] text-slate-400 mb-1 italic">เฉลี่ยช่วงเช้า</p>
                    <div id="avgMorning" class="text-xl font-bold text-teal-400">--/--</div>
                    <p id="adviceMorning" class="text-[8px] mt-1"></p>
                </div>
                <div class="bg-slate-800/80 p-3 rounded-2xl border border-orange-500/30 text-center">
                    <p class="text-[9px] text-slate-400 mb-1 italic">เฉลี่ยช่วงเย็น</p>
                    <div id="avgEvening" class="text-xl font-bold text-orange-400">--/--</div>
                    <p id="adviceEvening" class="text-[8px] mt-1"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPeriod = 'morning';
        let bpData = { morning: [], evening: [] };

        function setTime(period) {
            currentPeriod = period;
            const btnM = document.getElementById('btnMorning');
            const btnE = document.getElementById('btnEvening');
            if(period === 'morning') {
                btnM.className = "w-1/2 py-2 rounded-lg bg-teal-600 text-white text-sm font-medium";
                btnE.className = "w-1/2 py-2 rounded-lg text-slate-400 text-sm font-medium";
            } else {
                btnE.className = "w-1/2 py-2 rounded-lg bg-orange-600 text-white text-sm font-medium";
                btnM.className = "w-1/2 py-2 rounded-lg text-slate-400 text-sm font-medium";
            }
        }

        function addBPRecord() {
            const sys = parseInt(document.getElementById('sysIn').value);
            const dia = parseInt(document.getElementById('diaIn').value);

            if (sys && dia) {
                bpData[currentPeriod].push({ sys, dia });
                renderList();
                calculateDualAverage();
                document.getElementById('sysIn').value = '';
                document.getElementById('diaIn').value = '';
            } else {
                alert("กรุณากรอกข้อมูลให้ครบนะคะ");
            }
        }

        function renderList() {
            ['morning', 'evening'].forEach(period => {
                const list = document.getElementById(`list${period.charAt(0).toUpperCase() + period.slice(1)}`);
                list.innerHTML = bpData[period].map(item => 
                    `<li class="bg-slate-800/40 p-1 rounded-lg border-l-2 ${period === 'morning' ? 'border-teal-500' : 'border-orange-500'} flex justify-around">
                        <span class="font-bold text-slate-200">${item.sys}/${item.dia}</span>
                    </li>`
                ).join('') || '<li class="text-slate-600 italic font-light">ไม่มีข้อมูล</li>';
            });
        }

        function calculateDualAverage() {
            document.getElementById('resultBox').classList.remove('hidden');
            
            ['morning', 'evening'].forEach(period => {
                const data = bpData[period];
                const resText = document.getElementById(`avg${period.charAt(0).toUpperCase() + period.slice(1)}`);
                const advice = document.getElementById(`advice${period.charAt(0).toUpperCase() + period.slice(1)}`);
                
                if (data.length > 0) {
                    const avgSys = Math.round(data.reduce((a, b) => a + b.sys, 0) / data.length);
                    const avgDia = Math.round(data.reduce((a, b) => a + b.dia, 0) / data.length);
                    resText.innerText = `${avgSys} / ${avgDia}`;
                    
                    if (avgSys < 135 && avgDia < 85) {
                        advice.innerText = "ปกติค่ะ";
                        advice.className = "text-[8px] mt-1 text-green-400";
                    } else {
                        advice.innerText = "ค่อนข้างสูง";
                        advice.className = "text-[8px] mt-1 text-yellow-400";
                    }
                }
            });
        }
    </script>
</body>
</html>
