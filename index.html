<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HT Smart Control - OPD Takhli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-dark { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.75rem; padding: 0.6rem; width: 100%; color: white; outline: none; }
        .btn-teal { background: #0d9488; color: white; }
    </style>
</head>
<body class="p-4 pb-24" onload="initApp()">

    <div class="max-w-md mx-auto space-y-4">
        
        <!-- Header & Safety -->
        <div class="glass-card rounded-3xl p-5 border-t-4 border-teal-500 space-y-3">
            <h2 class="text-md font-bold text-teal-400 italic">HT SMART CONTROL (OPD TAKHLI)</h2>
            <div class="grid grid-cols-1 gap-2">
                <input type="text" id="comorbidity" placeholder="โรคประจำตัว..." class="input-dark text-xs" onchange="saveInfo()">
                <input type="text" id="allergyInput" placeholder="ประวัติแพ้ยา..." class="input-dark border-red-500/30 text-red-200 text-xs" onchange="saveInfo()">
            </div>
        </div>

        <!-- Medication Section -->
        <div class="glass-card rounded-3xl p-5 border-l-4 border-teal-500 space-y-3">
            <div class="flex justify-between items-center">
                <h3 class="text-xs font-bold text-teal-300 italic uppercase">จัดการรายการยา</h3>
                <div class="flex gap-2">
                    <button onclick="toggleMedList()" class="text-slate-400 text-xs"><i id="medIcon" class="fa-solid fa-eye-slash"></i></button>
                    <button onclick="addMedManual()" class="bg-teal-600/20 text-teal-400 px-2 py-1 rounded-lg text-[10px] border border-teal-500/30">+ เพิ่มยา</button>
                    <button onclick="document.getElementById('cameraInput').click()" class="bg-teal-600 text-white px-2 py-1 rounded-lg text-[10px]"><i class="fa-solid fa-camera"></i> สแกน</button>
                    <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden" onchange="processImage(this)">
                </div>
            </div>

            <div id="ocrStatus" class="hidden text-center py-2 bg-slate-800 rounded-xl">
                <p id="loader" class="text-[10px] text-teal-400 animate-pulse">กำลังวิเคราะห์ภาพ...</p>
                <div id="confirmZone" class="hidden space-y-2 p-2">
                    <input type="text" id="tempMedName" class="input-dark text-center text-xs" placeholder="ชื่อยาที่อ่านได้">
                    <button onclick="confirmMed()" class="w-full btn-teal py-1 rounded-lg text-[10px]">ตกลง</button>
                </div>
            </div>

            <div id="medListArea" class="space-y-2">
                <!-- รายการยา -->
            </div>
        </div>

        <!-- Trend Chart Section -->
        <div class="glass-card rounded-3xl p-4">
            <button onclick="toggleGraph()" class="w-full flex justify-between items-center text-teal-300 font-bold text-xs">
                <span><i class="fa-solid fa-chart-line mr-2"></i> สถิติแนวโน้มความดัน</span>
                <i id="graphIcon" class="fa-solid fa-chevron-down"></i>
            </button>
            <div id="graphSection" class="hidden mt-4 space-y-3">
                <div class="h-44 w-full"><canvas id="bpChart"></canvas></div>
                <div class="grid grid-cols-2 gap-y-1 text-[8px] border-t border-slate-800 pt-2 px-1">
                    <span class="flex items-center gap-1"><i class="fa-solid fa-circle text-red-500"></i> รพ. (OBP)</span>
                    <span class="flex items-center gap-1"><i class="fa-solid fa-circle text-[#4ade80]"></i> เฉลี่ยเช้า</span>
                    <span class="flex items-center gap-1"><i class="fa-solid fa-circle text-[#facc15]"></i> เฉลี่ยเย็น</span>
                    <span class="flex items-center gap-1 text-[#00ffff] font-bold">--- เป้าหมาย (135)</span>
                </div>
            </div>
        </div>

        <!-- BP Recording Section (2-2-7) -->
        <div class="glass-card rounded-3xl p-5 border-l-4 border-teal-500 space-y-4">
            <div class="grid grid-cols-2 gap-2">
                <div class="bg-slate-800/80 p-2 rounded-xl text-center border border-teal-500/20">
                    <p class="text-[8px] text-slate-400 uppercase font-bold">เฉลี่ยเช้า (7 วัน)</p>
                    <p id="avgM" class="text-sm font-bold text-teal-400">--/--</p>
                </div>
                <div class="bg-slate-800/80 p-2 rounded-xl text-center border border-yellow-500/10">
                    <p class="text-[8px] text-slate-400 uppercase font-bold">เฉลี่ยเย็น (7 วัน)</p>
                    <p id="avgE" class="text-sm font-bold text-yellow-400">--/--</p>
                </div>
            </div>
            
            <div class="flex gap-1 p-1 bg-slate-800 rounded-xl">
                <button onclick="setPeriod('morning')" id="btnM" class="flex-1 py-1.5 rounded-lg bg-teal-600 text-white text-[10px]">เช้า</button>
                <button onclick="setPeriod('evening')" id="btnE" class="flex-1 py-1.5 rounded-lg text-slate-400 text-[10px]">เย็น</button>
                <button onclick="setPeriod('hospital')" id="btnH" class="flex-1 py-1.5 rounded-lg text-slate-400 text-[10px]">รพ.</button>
            </div>

            <div class="flex gap-2">
                <input type="number" id="sysIn" placeholder="SYS" class="w-1/2 bg-slate-900 border border-slate-700 rounded-xl p-3 text-center text-xl font-bold text-white outline-none">
                <input type="number" id="diaIn" placeholder="DIA" class="w-1/2 bg-slate-900 border border-slate-700 rounded-xl p-3 text-center text-xl font-bold text-white outline-none">
            </div>
            <button onclick="addRecord()" class="w-full btn-teal p-3 rounded-xl text-xs font-bold shadow-lg">บันทึกข้อมูล</button>
        </div>

    </div>

    <script>
        let db = { hospital: [], home_m: [], home_e: [], info: { com: "", alr: "", meds: [] } };
        let currentP = 'morning';
        let myChart;

        function initApp() {
            const saved = localStorage.getItem('HT_V15_TAKHLI');
            if(saved) db = JSON.parse(saved);
            document.getElementById('comorbidity').value = db.info.com || "";
            document.getElementById('allergyInput').value = db.info.alr || "";
            renderMeds();
            updateUI();
        }

        // Medication Logic
        async function processImage(input) {
            if (!input.files || !input.files[0]) return;
            document.getElementById('ocrStatus').classList.remove('hidden');
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('confirmZone').classList.add('hidden');
            try {
                const result = await Tesseract.recognize(input.files[0], 'eng+tha');
                const text = result.data.text.split('\n').filter(l => l.trim().length > 3);
                document.getElementById('tempMedName').value = text[0] || "ไม่ระบุชื่อ";
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('confirmZone').classList.remove('hidden');
            } catch (e) { alert("อ่านภาพไม่สำเร็จค่ะ"); document.getElementById('ocrStatus').classList.add('hidden'); }
        }

        function addMedManual() {
            const name = prompt("ระบุชื่อยาและขนาด:");
            if(name) { db.info.meds.push({ id: Date.now(), n: name, r: "0" }); saveAndRef(); }
        }

        function confirmMed() {
            const n = document.getElementById('tempMedName').value;
            db.info.meds.push({ id: Date.now(), n: n, r: "0" });
            document.getElementById('ocrStatus').classList.add('hidden');
            saveAndRef();
        }

        function saveAndRef() { localStorage.setItem('HT_V15_TAKHLI', JSON.stringify(db)); renderMeds(); }

        function renderMeds() {
            const list = document.getElementById('medListArea');
            list.innerHTML = db.info.meds.map((m, i) => `
                <div class="bg-slate-800/50 p-3 rounded-2xl border border-slate-700 flex justify-between items-center">
                    <div class="flex-1">
                        <p class="text-[10px] text-teal-400 font-bold">${i+1}. ${m.n}</p>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="text-[8px] text-slate-500 uppercase">ยาเหลือ:</span>
                            <input type="number" value="${m.r}" onchange="updateRem(${m.id}, this.value)" class="w-12 bg-slate-900 border border-slate-700 rounded text-center text-[10px] text-orange-400">
                            <span class="text-[8px] text-slate-500">เม็ด</span>
                        </div>
                    </div>
                    <button onclick="delMed(${m.id})" class="text-red-500 text-xs px-2"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `).join('');
        }

        function updateRem(id, val) { const m = db.info.meds.find(x => x.id === id); if(m) { m.r = val; saveAndRef(); } }
        function delMed(id) { if(confirm("ลบรายการนี้?")) { db.info.meds = db.info.meds.filter(x => x.id !== id); saveAndRef(); } }
        function toggleMedList() { 
            const list = document.getElementById('medListArea');
            const icon = document.getElementById('medIcon');
            const isHidden = list.classList.toggle('hidden');
            icon.className = isHidden ? "fa-solid fa-eye" : "fa-solid fa-eye-slash";
        }

        // BP Logic
        function setPeriod(p) {
            currentP = p;
            document.querySelectorAll('#btnM, #btnE, #btnH').forEach(b => b.className = "flex-1 py-1.5 rounded-lg text-slate-400 text-[10px]");
            const activeBtn = p === 'morning' ? 'btnM' : (p === 'evening' ? 'btnE' : 'btnH');
            document.getElementById(activeBtn).className = "flex-1 py-1.5 rounded-lg bg-teal-600 text-white text-[10px]";
        }

        function addRecord() {
            const s = document.getElementById('sysIn').value, d = document.getElementById('diaIn').value;
            if(s && d) {
                const entry = { id: Date.now(), s: parseInt(s), d: parseInt(d), date: new Date().toLocaleDateString('th-TH') };
                if(currentP === 'morning') db.home_m.push(entry);
                else if(currentP === 'evening') db.home_e.push(entry);
                else db.hospital.push(entry);
                localStorage.setItem('HT_V15_TAKHLI', JSON.stringify(db));
                updateUI(); document.getElementById('sysIn').value = ''; document.getElementById('diaIn').value = '';
            }
        }

        function saveInfo() {
            db.info.com = document.getElementById('comorbidity').value;
            db.info.alr = document.getElementById('allergyInput').value;
            localStorage.setItem('HT_V15_TAKHLI', JSON.stringify(db));
        }

        function toggleGraph() {
            const sec = document.getElementById('graphSection');
            const icon = document.getElementById('graphIcon');
            const isHidden = sec.classList.toggle('hidden');
            icon.style.transform = isHidden ? "rotate(0deg)" : "rotate(180deg)";
            if(!isHidden) renderChart();
        }

        function updateUI() {
            const calcAvg = (arr) => {
                const last7 = arr.slice(-7);
                if(!last7.length) return "--/--";
                return Math.round(last7.reduce((a,b)=>a+b.s,0)/last7.length) + "/" + Math.round(last7.reduce((a,b)=>a+b.d,0)/last7.length);
            };
            document.getElementById('avgM').innerText = calcAvg(db.home_m);
            document.getElementById('avgE').innerText = calcAvg(db.home_e);
            if(!document.getElementById('graphSection').classList.contains('hidden')) renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('bpChart').getContext('2d');
            if(myChart) myChart.destroy();
            let labels = [...new Set([...db.hospital, ...db.home_m, ...db.home_e].map(x => x.date))].sort().slice(-7);
            if(!labels.length) labels = [new Date().toLocaleDateString('th-TH')];
            const getV = (arr, d) => { const f = arr.filter(x => x.date === d); return f.length ? f.reduce((a,b)=>a+b.s,0)/f.length : null; };
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'เป้าหมาย', data: Array(labels.length).fill(135), borderColor: '#00ffff', borderDash: [5, 5], pointRadius: 0, fill: false },
                        { label: 'รพ.', data: labels.map(l => getV(db.hospital, l)), borderColor: '#ef4444', backgroundColor: '#ef4444', pointStyle: 'rectRot', radius: 6, spanGaps: true },
                        { label: 'เช้า', data: labels.map(l => getV(db.home_m, l)), borderColor: '#4ade80', backgroundColor: '#4ade80', tension: 0.3, spanGaps: true },
                        { label: 'เย็น', data: labels.map(l => getV(db.home_e, l)), borderColor: '#facc15', backgroundColor: '#facc15', tension: 0.3, spanGaps: true }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 90, max: 190, ticks: { size: 9, color: '#94a3b8' } } } }
            });
        }
    </script>
</body>
</html>
