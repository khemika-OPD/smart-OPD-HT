<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HT Smart Dashboard - OPD Takhli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4" onload="initApp()">

    <div class="max-w-md mx-auto space-y-6 pb-20">
        <!-- Header & Profile -->
        <div class="glass-card rounded-3xl p-5 border-t-4 border-teal-500">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-slate-700 rounded-xl overflow-hidden border border-teal-500/50">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Khemika" alt="avatar">
                    </div>
                    <div>
                        <h2 class="text-md font-bold italic">HT SMART Dashboard</h2>
                        <p class="text-[10px] text-teal-400">เป้าหมาย: < 135/85 mmHg</p>
                    </div>
                </div>
                <div class="text-right text-[10px] text-slate-400">HN: 12345/69</div>
            </div>
        </div>

        <!-- Section: กราฟเปรียบเทียบ (Hospital vs Home) -->
        <div class="glass-card rounded-3xl p-6">
            <h3 class="text-xs font-semibold mb-4 uppercase tracking-widest text-teal-300">
                <i class="fa-solid fa-chart-line mr-2"></i> กราฟเปรียบเทียบความดัน
            </h3>
            <div class="h-48 w-full">
                <canvas id="bpChart"></canvas>
            </div>
            <div class="flex justify-center gap-4 mt-4 text-[9px]">
                <span class="flex items-center gap-1"><span class="w-2 h-2 bg-red-500 rounded-full"></span> ที่ รพ.</span>
                <span class="flex items-center gap-1"><span class="w-2 h-2 bg-teal-400 rounded-full"></span> ที่บ้าน (เฉลี่ย)</span>
            </div>
        </div>

        <!-- Section: บันทึกความดันที่ รพ. (สำหรับพยาบาล) -->
        <div class="glass-card rounded-3xl p-6 border-l-4 border-red-500/50">
            <h3 class="text-xs font-semibold mb-3 text-red-400 uppercase">
                <i class="fa-solid fa-hospital mr-1"></i> บันทึกโดยพยาบาล (ที่ รพ.)
            </h3>
            <div class="grid grid-cols-2 gap-2 mb-3">
                <input type="date" id="hospitalDate" class="col-span-2 bg-slate-800 border border-slate-700 rounded-xl p-2 text-xs text-white outline-none">
                <input type="number" id="hSys" placeholder="SYS" class="bg-slate-800 border border-slate-700 rounded-xl p-2 text-center text-white outline-none">
                <input type="number" id="hDia" placeholder="DIA" class="bg-slate-800 border border-slate-700 rounded-xl p-2 text-center text-white outline-none">
            </div>
            <button onclick="addHospitalRecord()" class="w-full bg-red-600/80 hover:bg-red-500 p-2 rounded-xl text-[10px] font-bold transition-all">
                บันทึกค่าที่โรงพยาบาล
            </button>
        </div>

        <!-- Section: บันทึกความดันที่บ้าน (2-2-7) -->
        <div class="glass-card rounded-3xl p-6 border-l-4 border-teal-500/50">
            <h3 class="text-xs font-semibold mb-3 text-teal-400 uppercase">
                <i class="fa-solid fa-house-user mr-1"></i> บันทึกที่บ้าน (สูตร 2-2-7)
            </h3>
            <div class="flex gap-2 p-1 bg-slate-800 rounded-xl mb-3">
                <button onclick="setTime('morning')" id="btnM" class="w-1/2 py-1.5 rounded-lg bg-teal-600 text-[10px] text-white">เช้า</button>
                <button onclick="setTime('evening')" id="btnE" class="w-1/2 py-1.5 rounded-lg text-[10px] text-slate-400">เย็น</button>
            </div>
            <div class="grid grid-cols-2 gap-2 mb-3">
                <input type="number" id="sysIn" placeholder="SYS" class="bg-slate-800 border border-slate-700 rounded-xl p-2 text-center text-white outline-none">
                <input type="number" id="diaIn" placeholder="DIA" class="bg-slate-800 border border-slate-700 rounded-xl p-2 text-center text-white outline-none">
            </div>
            <button onclick="addHomeRecord()" class="w-full bg-teal-600 p-2 rounded-xl text-[10px] font-bold">บันทึกค่าที่บ้าน</button>
        </div>
    </div>

    <script>
        let hospitalData = []; // { date: '2024-05-01', sys: 140, dia: 90 }
        let homeData = { morning: [], evening: [] };
        let currentPeriod = 'morning';
        let myChart;

        function initApp() {
            // โหลดข้อมูลเก่าถ้ามี
            const savedH = localStorage.getItem('h_data');
            const savedHome = localStorage.getItem('home_data');
            if(savedH) hospitalData = JSON.parse(savedH);
            if(savedHome) homeData = JSON.parse(savedHome);
            updateChart();
        }

        function setTime(p) {
            currentPeriod = p;
            document.getElementById('btnM').className = p === 'morning' ? "w-1/2 py-1.5 rounded-lg bg-teal-600 text-white text-[10px]" : "w-1/2 py-1.5 rounded-lg text-slate-400 text-[10px]";
            document.getElementById('btnE').className = p === 'evening' ? "w-1/2 py-1.5 rounded-lg bg-teal-600 text-white text-[10px]" : "w-1/2 py-1.5 rounded-lg text-slate-400 text-[10px]";
        }

        function addHospitalRecord() {
            const date = document.getElementById('hospitalDate').value;
            const sys = parseInt(document.getElementById('hSys').value);
            const dia = parseInt(document.getElementById('hDia').value);
            if(date && sys && dia) {
                hospitalData.push({ date, sys, dia });
                localStorage.setItem('h_data', JSON.stringify(hospitalData));
                updateChart();
                alert("บันทึกค่า รพ. เรียบร้อย");
            }
        }

        function addHomeRecord() {
            const sys = parseInt(document.getElementById('sysIn').value);
            const dia = parseInt(document.getElementById('diaIn').value);
            if(sys && dia) {
                homeData[currentPeriod].push({ sys, dia, date: new Date().toISOString().split('T')[0] });
                localStorage.setItem('home_data', JSON.stringify(homeData));
                updateChart();
                alert("บันทึกค่าที่บ้านเรียบร้อย");
            }
        }

        function updateChart() {
            const ctx = document.getElementById('bpChart').getContext('2d');
            if(myChart) myChart.destroy();

            // จัดการข้อมูลแสดงผล (ตัวอย่างแบบง่าย: ใช้ข้อมูล 5 ครั้งล่าสุด)
            const labels = hospitalData.map(d => d.date);
            const hValues = hospitalData.map(d => d.sys);
            
            // คำนวณค่าเฉลี่ยที่บ้านรวมกัน
            const homeAvg = (homeData.morning.reduce((a,b)=>a+b.sys,0) + homeData.evening.reduce((a,b)=>a+b.sys,0)) / 
                            (homeData.morning.length + homeData.evening.length || 1);

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels.length > 0 ? labels : ['ไม่มีข้อมูล'],
                    datasets: [
                        {
                            label: 'SYS (ที่โรงพยาบาล)',
                            data: hValues,
                            borderColor: '#ef4444',
                            backgroundColor: 'rgba(239, 68, 68, 0.2)',
                            tension: 0.3,
                            fill: true
                        },
                        {
                            label: 'SYS (เฉลี่ยที่บ้าน)',
                            data: Array(labels.length).fill(homeAvg),
                            borderColor: '#2dd4bf',
                            borderDash: [5, 5],
                            pointRadius: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { min: 80, max: 200, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8', font: { size: 9 } } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 8 } } }
                    }
                }
            });
        }
    </script>
</body>
</html>
