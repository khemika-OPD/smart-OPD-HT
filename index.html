<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HT Smart Dashboard - OPD Takhli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-active { background-color: #2dd4bf; color: #0f172a; font-weight: bold; }
    </style>
</head>
<body class="p-4" onload="initApp()">

    <div class="max-w-md mx-auto space-y-6 pb-20">
        <!-- Profile & Goal -->
        <div class="glass-card rounded-3xl p-5 border-t-4 border-teal-500">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-slate-700 rounded-xl border border-teal-500/50 overflow-hidden">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Khemika" alt="avatar">
                    </div>
                    <div>
                        <h2 class="text-md font-bold italic underline decoration-teal-500">HT SMART</h2>
                        <p class="text-[10px] text-teal-400">เป้าหมาย: < 135/85 mmHg</p>
                    </div>
                </div>
                <div class="text-right text-[10px] text-slate-400 italic">
                    <p>คุณเขมิกา พงษ์ศรี</p>
                    <p>HN: 12345/69</p>
                </div>
            </div>
        </div>

        <!-- Section: สถิติและกราฟ (แบบซ่อนไว้) -->
        <div class="glass-card rounded-3xl p-6">
            <button onclick="toggleGraph()" class="w-full flex justify-between items-center text-teal-300 font-semibold text-sm">
                <span><i class="fa-solid fa-chart-line mr-2"></i> ดูสถิติและความถี่ความดัน</span>
                <i id="graphIcon" class="fa-solid fa-chevron-down"></i>
            </button>

            <div id="graphSection" class="hidden mt-6 space-y-4">
                <!-- Filter Tabs -->
                <div class="flex gap-1 bg-slate-800 p-1 rounded-xl text-[10px]">
                    <button onclick="updateView('week')" id="tab-week" class="flex-1 py-2 rounded-lg tab-active">สัปดาห์</button>
                    <button onclick="updateView('month')" id="tab-month" class="flex-1 py-2 rounded-lg text-slate-400">รายเดือน</button>
                    <button onclick="updateView('year')" id="tab-year" class="flex-1 py-2 rounded-lg text-slate-400">รายปี</button>
                </div>
                
                <div class="h-48 w-full">
                    <canvas id="bpChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Section: บันทึกข้อมูล (คงเดิม) -->
        <div class="grid grid-cols-1 gap-4">
            <!-- ปุ่มบันทึกที่บ้าน -->
            <div class="glass-card rounded-3xl p-6 border-l-4 border-teal-500">
                <h3 class="text-xs font-bold text-teal-400 mb-3 uppercase tracking-wider">บันทึกที่บ้าน (2-2-7)</h3>
                <div class="flex gap-2 mb-3">
                    <input type="number" id="sysIn" placeholder="SYS" class="w-1/2 bg-slate-800 border border-slate-700 rounded-xl p-3 text-center text-white outline-none">
                    <input type="number" id="diaIn" placeholder="DIA" class="w-1/2 bg-slate-800 border border-slate-700 rounded-xl p-3 text-center text-white outline-none">
                </div>
                <button onclick="addHomeRecord()" class="w-full bg-teal-600 p-3 rounded-xl text-[11px] font-bold shadow-lg">บันทึกค่า</button>
            </div>
        </div>

        <!-- Footer Credit -->
        <p class="text-center text-[9px] text-slate-600 italic">พัฒนาโดย พว. เขมิกา พงษ์ศรี | OPD โรงพยาบาลตาคลี</p>
    </div>

    <script>
        let isGraphVisible = false;
        let bpData = { morning: [], evening: [] };
        let myChart;

        function initApp() {
            const saved = localStorage.getItem('home_data');
            if(saved) bpData = JSON.parse(saved);
        }

        function toggleGraph() {
            const section = document.getElementById('graphSection');
            const icon = document.getElementById('graphIcon');
            isGraphVisible = !isGraphVisible;
            
            if(isGraphVisible) {
                section.classList.remove('hidden');
                icon.className = "fa-solid fa-chevron-up";
                updateView('week'); // แสดงกราฟเริ่มต้นที่รายสัปดาห์
            } else {
                section.classList.add('hidden');
                icon.className = "fa-solid fa-chevron-down";
            }
        }

        function updateView(view) {
            // ปรับแต่ง UI ของ Tab
            const tabs = ['week', 'month', 'year'];
            tabs.forEach(t => {
                document.getElementById('tab-' + t).className = (t === view) ? 
                    "flex-1 py-2 rounded-lg tab-active" : "flex-1 py-2 rounded-lg text-slate-400";
            });

            // จำลองการดึงข้อมูลตามความถี่ (ในอนาคตอาจารย์สามารถเพิ่ม Logic แยกวันที่จริงได้ค่ะ)
            renderChart(view);
        }

        function renderChart(view) {
            const ctx = document.getElementById('bpChart').getContext('2d');
            if(myChart) myChart.destroy();

            // จำลอง Labels ตาม View
            let labels = [];
            if(view === 'week') labels = ['จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.', 'อา.'];
            else if(view === 'month') labels = ['สัปดาห์ 1', 'สัปดาห์ 2', 'สัปดาห์ 3', 'สัปดาห์ 4'];
            else labels = ['ม.ค.', 'เม.ย.', 'ก.ค.', 'ต.ค.'];

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'ความดันตัวบน (SYS)',
                        data: [120, 135, 128, 140, 132, 125, 130], // ข้อมูลตัวอย่าง
                        borderColor: '#2dd4bf',
                        backgroundColor: 'rgba(45, 212, 191, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { min: 100, max: 180, ticks: { color: '#64748b', font: { size: 9 } } },
                        x: { ticks: { color: '#64748b', font: { size: 8 } } }
                    }
                }
            });
        }

        function addHomeRecord() {
            const sys = parseInt(document.getElementById('sysIn').value);
            const dia = parseInt(document.getElementById('diaIn').value);
            if(sys && dia) {
                bpData.morning.push({ sys, dia, date: new Date().toISOString() });
                localStorage.setItem('home_data', JSON.stringify(bpData));
                alert("บันทึกค่าเรียบร้อยแล้วค่ะ");
                if(isGraphVisible) updateView('week');
            }
        }
    </script>
</body>
</html>
