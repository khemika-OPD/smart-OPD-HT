<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart HT Dashboard - OPD Takhli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-md mx-auto space-y-6">
        <!-- หัวข้อหลัก -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-teal-400">HT SMART</h1>
                <p class="text-sm text-slate-400">ข้อมูลสุขภาพของคุณเขมิกา</p>
            </div>
            <div class="w-12 h-12 bg-teal-500 rounded-full flex items-center justify-center shadow-lg shadow-teal-500/20">
                <i class="fa-solid fa-heart-pulse text-2xl"></i>
            </div>
        </div>

        <!-- การบันทึกความดัน 2-2-7 -->
        <div class="glass-card rounded-3xl p-6">
            <h3 class="text-lg font-medium mb-4 flex items-center gap-2 text-teal-300">
                <i class="fa-solid fa-file-medical"></i> บันทึกความดัน สูตร 2-2-7
            </h3>
            <div class="space-y-4">
                <div class="flex gap-2">
                    <input type="number" id="sysIn" placeholder="ตัวบน (SYS)" class="w-1/2 bg-slate-800 border border-slate-600 rounded-xl p-3 text-center text-white focus:border-teal-400 outline-none">
                    <input type="number" id="diaIn" placeholder="ตัวล่าง (DIA)" class="w-1/2 bg-slate-800 border border-slate-600 rounded-xl p-3 text-center text-white focus:border-teal-400 outline-none">
                </div>
                <button onclick="addBPRecord()" class="w-full bg-teal-600 hover:bg-teal-500 p-3 rounded-xl font-semibold transition-all">
                    บันทึกค่าตอนนี้
                </button>
            </div>
            
            <!-- ส่วนแสดงผลค่าเฉลี่ย -->
            <div id="resultBox" class="mt-6 p-4 bg-slate-800/50 rounded-2xl border border-slate-700 text-center hidden">
                <p class="text-xs text-slate-400 mb-1">ค่าเฉลี่ยของคุณหมอตอนนี้</p>
                <div id="avgResult" class="text-3xl font-bold text-teal-400">-- / --</div>
                <p id="healthAdvice" class="text-xs mt-2 text-slate-300 italic"></p>
            </div>
        </div>
        
        <!-- ส่วนถ่ายรูปซองยา -->
        <div class="glass-card rounded-3xl p-6">
            <h3 class="text-lg font-medium mb-4 flex items-center gap-2">
                <i class="fa-solid fa-camera text-teal-400"></i> ถ่ายรูปซองยา
            </h3>
            <div class="border-2 border-dashed border-slate-600 rounded-2xl p-6 text-center cursor-pointer hover:border-teal-400" onclick="document.getElementById('medImage').click()">
                <i class="fa-solid fa-plus text-2xl text-slate-500 mb-2"></i>
                <p class="text-xs text-slate-400">คลิกเพื่อถ่ายรูปยาที่ทานประจำ</p>
                <input type="file" id="medImage" class="hidden" accept="image/*" capture="environment">
            </div>
        </div>
    </div>

    <!-- ส่วนสำคัญ: โค้ดทำงานต้องอยู่ใน <script> แบบนี้ค่ะ -->
    <script>
        let bpRecords = [];

        function addBPRecord() {
            const sys = parseInt(document.getElementById('sysIn').value);
            const dia = parseInt(document.getElementById('diaIn').value);

            if (sys && dia) {
                bpRecords.push({ sys, dia });
                updateDisplay();
                document.getElementById('sysIn').value = '';
                document.getElementById('diaIn').value = '';
            } else {
                alert("กรุณากรอกตัวเลขความดันให้ครบนะคะ");
            }
        }

        function updateDisplay() {
            const sumSys = bpRecords.reduce((a, b) => a + b.sys, 0);
            const sumDia = bpRecords.reduce((a, b) => a + b.dia, 0);
            const avgSys = Math.round(sumSys / bpRecords.length);
            const avgDia = Math.round(sumDia / bpRecords.length);

            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('avgResult').innerText = `${avgSys} / ${avgDia}`;
            
            const advice = document.getElementById('healthAdvice');
            if (avgSys < 135 && avgDia < 85) {
                advice.innerText = "เยี่ยมมากค่ะ! อยู่ในเกณฑ์ปกติ รักษาสุขภาพต่อไปนะคะ";
                advice.className = "text-xs mt-2 text-green-400";
            } else {
                advice.innerText = "ความดันค่อนข้างสูง อย่าลืมทานยาและพักผ่อนนะคะ";
                advice.className = "text-xs mt-2 text-yellow-400";
            }
        }
    </script>
</body>
</html>
