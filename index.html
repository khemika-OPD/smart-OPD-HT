<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HT Smart Dashboard - OPD Takhli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-line { background-color: #06C755; }
    </style>
</head>
<body class="p-4" onload="initApp()">

    <div class="max-w-md mx-auto space-y-6 pb-20">
        <!-- Profile & Goal -->
        <div class="glass-card rounded-3xl p-5 border-t-4 border-teal-500">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-slate-700 rounded-xl border border-teal-500/50 overflow-hidden">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Khemika" alt="avatar">
                    </div>
                    <div>
                        <h2 class="text-md font-bold italic">HT SMART Dashboard</h2>
                        <p class="text-[10px] text-teal-400 font-medium">เป้าหมาย: < 135/85 mmHg</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-slate-400">คุณเขมิกา พงษ์ศรี</p>
                    <p class="text-[9px] text-slate-500 italic">HN: 12345/69</p>
                </div>
            </div>
            <!-- Allergy (Nurse Verify System) -->
            <div id="allergyBox" class="bg-red-500/10 border border-red-500/30 p-3 rounded-2xl flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-triangle-exclamation text-red-500 text-xs"></i>
                    <span id="allergyInfo" class="text-[10px] text-red-200 font-medium italic italic">รอพยาบาลสแกนข้อมูล...</span>
                </div>
                <button id="btnNurse" onclick="triggerScanner()" class="text-[9px] bg-red-600 px-2 py-1 rounded-lg font-bold">ยืนยัน</button>
            </div>
        </div>

        <!-- Graph Section -->
        <div class="glass-card rounded-3xl p-6">
            <div class="h-44 w-full"><canvas id="bpChart"></canvas></div>
            <div class="flex justify-center gap-4 mt-2 text-[9px]">
                <span class="flex items-center gap-1 text-red-400"><i class="fa-solid fa-circle text-[6px]"></i> รพ.</span>
                <span class="flex items-center gap-1 text-teal-400"><i class="fa-solid fa-circle text-[6px]"></i> บ้าน (เฉลี่ย)</span>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="grid grid-cols-2 gap-4">
            <button onclick="shareToLine()" class="btn-line p-4 rounded-2xl font-bold text-white shadow-lg flex flex-col items-center gap-1">
                <i class="fa-brands fa-line text-xl"></i>
                <span class="text-[10px]">ส่งข้อมูลเข้า LINE</span>
            </button>
            <button onclick="clearDataSafe()" class="bg-slate-700 p-4 rounded-2xl font-bold text-slate-300 flex flex-col items-center gap-1">
                <i class="fa-solid fa-trash-can text-xl text-slate-500"></i>
                <span class="text-[10px]">ล้างข้อมูล (ปลอดภัย)</span>
            </button>
        </div>

        <p class="text-center text-[9px] text-slate-600 font-light italic">Digital Tool สำหรับ OPD โรงพยาบาลตาคลี โดย เขมิกา พงษ์ศรี</p>
    </div>

    <script>
        let hospitalData = [];
        let homeData = { morning: [], evening: [] };
        let myChart;

        function initApp() {
            hospitalData = JSON.parse(localStorage.getItem('h_data') || '[]');
            homeData = JSON.parse(localStorage.getItem('home_data') || '{"morning":[],"evening":[]}');
            updateChart();
        }

        function triggerScanner() {
            const info = "แพ้ยา: Penicillin (อาการ: ผื่นคัน)";
            document.getElementById('allergyInfo').innerText = info;
            document.getElementById('btnNurse').innerHTML = '<i class="fa-solid fa-check"></i> เรียบร้อย';
            document.getElementById('btnNurse').className = "text-[9px] text-green-400 font-bold";
        }

        function shareToLine() {
            const avgM = calculateAvg(homeData.morning);
            const avgE = calculateAvg(homeData.evening);
            const message = `📊 สรุปความดันคุณเขมิกา\n🎯 เป้าหมาย: < 135/85\n☀️ เฉลี่ยเช้า: ${avgM}\n🌙 เฉลี่ยเย็น: ${avgE}\n📌 บันทึกผ่านระบบ HT Smart OPD ตาคลี`;
            const lineUrl = `https://line.me/R/msg/text/?${encodeURIComponent(message)}`;
            window.open(lineUrl, '_blank');
        }

        function calculateAvg(data) {
            if(data.length === 0) return "--/--";
            const s = Math.round(data.reduce((a,b)=>a+b.sys,0)/data.length);
            const d = Math.round(data.reduce((a,b)=>a+b.dia,0)/data.length);
            return `${s}/${d}`;
        }

        function clearDataSafe() {
            const check = prompt("พิมพ์คำว่า 'ลบข้อมูล' เพื่อยืนยันการลบประวัติสุขภาพทั้งหมด:");
            if(check === "ลบข้อมูล") {
                localStorage.clear();
                location.reload();
            }
        }

        function updateChart() {
            const ctx = document.getElementById('bpChart').getContext('2d');
            if(myChart) myChart.destroy();
            const hAvg = (homeData.morning.reduce((a,b)=>a+b.sys,0) + homeData.evening.reduce((a,b)=>a+b.sys,0)) / (homeData.morning.length + homeData.evening.length || 1);
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: hospitalData.map(d => d.date).length ? hospitalData.map(d => d.date) : ['ไม่มีข้อมูล'],
                    datasets: [
                        { label: 'รพ.', data: hospitalData.map(d => d.sys), borderColor: '#ef4444', tension: 0.3, fill: false },
                        { label: 'บ้าน', data: Array(hospitalData.length || 1).fill(hAvg), borderColor: '#2dd4bf', borderDash: [5, 5], pointRadius: 0 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 80, max: 200, ticks: { color: '#475569', font: { size: 9 } } }, x: { ticks: { color: '#475569', font: { size: 8 } } } } }
            });
        }
    </script>
</body>
</html>
