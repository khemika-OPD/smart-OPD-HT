<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HT Smart Control - OPD Takhli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Library สำหรับอ่านข้อความจากภาพ (OCR) -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-dark { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.75rem; padding: 0.6rem; width: 100%; color: white; outline: none; }
        .loading-spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #2dd4bf; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4" onload="initApp()">

    <div class="max-w-md mx-auto space-y-4 pb-24">
        
        <!-- Header & Patient Info -->
        <div class="glass-card rounded-3xl p-5 border-t-4 border-teal-500 space-y-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-teal-500/20 rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-pills text-teal-400"></i>
                    </div>
                    <div>
                        <h2 class="text-sm font-bold text-teal-400 uppercase">HT SMART CONTROL</h2>
                        <p class="text-[10px] text-slate-400">พว. เขมิกา พงษ์ศรี | OPD Takhli</p>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="comorbidity" placeholder="โรคประจำตัว" class="input-dark text-[10px]" onchange="saveInfo()">
                <input type="text" id="allergyInput" placeholder="ประวัติแพ้ยา" class="input-dark border-red-500/30 text-red-300 text-[10px]" onchange="saveInfo()">
            </div>
        </div>

        <!-- ระบบอ่านหน้าซองยา (OCR Scanner) -->
        <div class="glass-card rounded-3xl p-5 border-l-4 border-teal-500 space-y-3">
            <div class="flex justify-between items-center">
                <h3 class="text-xs font-bold text-teal-400 italic uppercase">Medication Photo Scanner</h3>
            </div>
            
            <div class="flex flex-col items-center justify-center border-2 border-dashed border-slate-700 rounded-2xl p-4 bg-slate-800/30">
                <label for="cameraInput" class="cursor-pointer flex flex-col items-center">
                    <i class="fa-solid fa-camera text-2xl text-teal-400 mb-2"></i>
                    <span class="text-[10px] text-slate-400">ถ่ายภาพหน้าซองยาเพื่ออ่านชื่อยา</span>
                    <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden" onchange="processImage(this)">
                </label>
                <div id="loader" class="hidden mt-3 flex items-center gap-2">
                    <div class="loading-spinner"></div>
                    <span class="text-[9px] text-teal-400 italic">กำลังวิเคราะห์ข้อความ...</span>
                </div>
            </div>

            <!-- รายการยาที่อ่านได้ -->
            <div id="medContainer" class="space-y-2 mt-4">
                <!-- รายการยาพร้อมช่อง 'เหลือ' จะแสดงที่นี่ -->
            </div>
        </div>

        <!-- กราฟ & บันทึกความดัน (ส่วนเดิมที่สมบูรณ์แล้ว) -->
        <div class="glass-card rounded-3xl p-4">
            <div class="h-40 w-full"><canvas id="bpChart"></canvas></div>
            <div class="grid grid-cols-2 gap-y-1 text-[8px] border-t border-slate-800 pt-2 mt-2">
                <span class="flex items-center gap-1"><i class="fa-solid fa-circle text-red-500"></i> รพ.</span>
                <span class="flex items-center gap-1"><i class="fa-solid fa-circle text-[#4ade80]"></i> เช้า</span>
                <span class="flex items-center gap-1"><i class="fa-solid fa-circle text-[#facc15]"></i> เย็น</span>
                <span class="flex items-center gap-1 text-[#00ffff] font-bold">--- เป้าหมาย 135</span>
            </div>
        </div>

        <div class="glass-card rounded-3xl p-5 border-l-4 border-teal-500">
            <div class="flex gap-2 mb-3">
                <input type="number" id="sysIn" placeholder="SYS" class="w-1/2 bg-slate-800 border border-slate-700 rounded-xl p-3 text-center text-white outline-none">
                <input type="number" id="diaIn" placeholder="DIA" class="w-1/2 bg-slate-800 border border-slate-700 rounded-xl p-3 text-center text-white outline-none">
            </div>
            <button onclick="addRec('home')" class="w-full bg-teal-600 p-3 rounded-xl text-xs font-bold shadow-lg">บันทึกความดันบ้าน</button>
        </div>

    </div>

    <script>
        let db = { hospital: [], home_m: [], home_e: [], info: { com: "", alr: "", meds: [] } };
        let myChart;

        function initApp() {
            const saved = localStorage.getItem('ht_ocr_v13');
            if(saved) db = JSON.parse(saved);
            document.getElementById('comorbidity').value = db.info.com || "";
            document.getElementById('allergyInput').value = db.info.alr || "";
            renderMeds();
            updateUI();
        }

        // ระบบอ่านชื่อยาจากภาพ (OCR)
        async function processImage(input) {
            if (!input.files || !input.files[0]) return;
            
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');

            try {
                const result = await Tesseract.recognize(input.files[0], 'eng+tha');
                const text = result.data.text;
                
                // ดึงชื่อยาแบบง่าย (สมมติว่าเป็นบรรทัดแรกที่มีข้อความสำคัญ)
                const lines = text.split('\n').filter(l => l.trim().length > 5);
                const medName = lines[0] || "ไม่ทราบชื่อยา";

                db.info.meds.push({ id: Date.now(), n: medName, r: "0" });
                saveMed();
            } catch (e) {
                alert("ไม่สามารถอ่านภาพได้ กรุณาลองใหม่อีกครั้ง");
            } finally {
                loader.classList.add('hidden');
                input.value = '';
            }
        }

        function updateRemaining(id, val) {
            const med = db.info.meds.find(m => m.id === id);
            if(med) { med.r = val; localStorage.setItem('ht_ocr_v13', JSON.stringify(db)); }
        }

        function saveMed() {
            localStorage.setItem('ht_ocr_v13', JSON.stringify(db));
            renderMeds();
        }

        function delMed(id) {
            db.info.meds = db.info.meds.filter(m => m.id !== id);
            saveMed();
        }

        function renderMeds() {
            const list = document.getElementById('medContainer');
            list.innerHTML = db.info.meds.map((m, i) => `
                <div class="bg-slate-800/60 p-3 rounded-2xl border border-slate-700 space-y-2 animate-fade-in">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] text-teal-400 font-bold">${i+1}. ${m.n}</span>
                        <button onclick="delMed(${m.id})" class="text-red-500 text-[10px]"><i class="fa-solid fa-trash"></i></button>
                    </div>
                    <div class="flex items-center gap-3 bg-slate-900/50 p-2 rounded-lg">
                        <span class="text-[9px] text-slate-400 uppercase">ยาคงเหลือ:</span>
                        <input type="number" value="${m.r}" onchange="updateRemaining(${m.id}, this.value)" 
                               class="w-20 bg-slate-800 border border-slate-600 rounded p-1 text-center text-xs text-orange-400 font-bold outline-none">
                        <span class="text-[9px] text-slate-400">เม็ด</span>
                    </div>
                </div>
            `).join('') || '<p class="text-[10px] text-slate-500 text-center py-2 italic">ถ่ายภาพหน้าซองยาเพื่อเพิ่มรายการ</p>';
        }

        // ระบบบันทึกและกราฟ (ส่วนคงที่)
        function saveInfo() {
            db.info.com = document.getElementById('comorbidity').value;
            db.info.alr = document.getElementById('allergyInput').value;
            localStorage.setItem('ht_ocr_v13', JSON.stringify(db));
        }

        function addRec(type) {
            const sys = document.getElementById('sysIn').value;
            const dia = document.getElementById('diaIn').value;
            if(sys && dia) {
                const entry = { id: Date.now(), s: parseInt(sys), d: parseInt(dia), date: new Date().toLocaleDateString('th-TH') };
                db.home_m.push(entry); // จำลองลงเช้า
                localStorage.setItem('ht_ocr_v13', JSON.stringify(db));
                updateUI();
                document.getElementById('sysIn').value = ''; document.getElementById('diaIn').value = '';
            }
        }

        function updateUI() {
            const avg = (arr) => {
                const l = arr.slice(-7);
                if(!l.length) return "--/--";
                return Math.round(l.reduce((a,b)=>a+b.s,0)/l.length) + "/" + Math.round(l.reduce((a,b)=>a+b.d,0)/l.length);
            };
            document.getElementById('avgM').innerText = avg(db.home_m);
            document.getElementById('avgE').innerText = avg(db.home_e);
            renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('bpChart').getContext('2d');
            if(myChart) myChart.destroy();
            let labels = [...new Set([...db.hospital, ...db.home_m, ...db.home_e].map(x => x.date))].sort().slice(-7);
            if(!labels.length) labels = [new Date().toLocaleDateString('th-TH')];
            const getV = (arr, d) => {
                const f = arr.filter(x => x.date === d);
                return f.length ? f.reduce((a,b)=>a+b.s,0)/f.length : null;
            };
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'เป้าหมาย', data: Array(labels.length).fill(135), borderColor: '#00ffff', borderDash: [5, 5], pointRadius: 0, fill: false },
                        { label: 'รพ.', data: labels.map(l => getV(db.hospital, l)), borderColor: '#ef4444', backgroundColor: '#ef4444', pointStyle: 'rectRot', radius: 6, spanGaps: true },
                        { label: 'เช้า', data: labels.map(l => getV(db.home_m, l)), borderColor: '#4ade80', backgroundColor: '#4ade80', tension: 0.3 },
                        { label: 'เย็น', data: labels.map(l => getV(db.home_e, l)), borderColor: '#facc15', backgroundColor: '#facc15', tension: 0.3 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 90, max: 190, ticks: { size: 9, color: '#94a3b8' } } } }
            });
        }
    </script>
</body>
</html>
