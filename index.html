<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takhli HT Smart Care</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background: #0f172a; color: #f8fafc; min-height: 100vh; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .input-profile { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.5rem; padding: 0.25rem 0.5rem; color: #2dd4bf; outline: none; font-size: 0.875rem; width: 100%; }
        .input-comorbidity { background: rgba(45, 212, 191, 0.15); border: 1px solid rgba(45, 212, 191, 0.5); border-radius: 1rem; padding: 0.75rem; width: 100%; color: #2dd4bf; outline: none; }
        .input-allergy { background: rgba(244, 63, 94, 0.15); border: 1px solid rgba(244, 63, 94, 0.5); border-radius: 1rem; padding: 0.75rem; width: 100%; color: #fb7185; outline: none; font-weight: bold; }
        .btn-gradient { background: linear-gradient(90deg, #0d9488 0%, #2dd4bf 100%); transition: 0.3s; }
    </style>
</head>
<body class="p-4 pb-12" onload="initApp()">

    <div class="max-w-md mx-auto space-y-4">
        
        <!-- บล็อก 1: ข้อมูลผู้ป่วย (คงเดิม) -->
        <div class="glass-card rounded-[2rem] p-6 border-t-4 border-teal-400 text-center">
            <h1 class="text-lg font-bold text-teal-400 tracking-tight uppercase">Takhli HT Smart Care</h1>
            <div class="flex items-center gap-4 py-4 border-y border-slate-700/50 my-4 text-left">
                <div class="w-14 h-14 bg-teal-500/20 rounded-2xl flex items-center justify-center border border-teal-400/30">
                    <i class="fa-solid fa-id-card-clip text-teal-400 text-2xl"></i>
                </div>
                <div class="flex-1 space-y-2">
                    <input type="text" id="patientHN" placeholder="HN ผู้ป่วย..." class="input-profile font-bold italic" onchange="saveInfo()">
                    <input type="text" id="patientName" placeholder="ชื่อ-นามสกุล..." class="input-profile" onchange="saveInfo()">
                </div>
            </div>
            <div class="space-y-4 text-left">
                <input type="text" id="comorbidity" placeholder="โรคประจำตัว..." class="input-comorbidity text-sm" onchange="saveInfo()">
                <input type="text" id="allergyInput" placeholder="ประวัติแพ้ยา..." class="input-allergy text-sm" onchange="saveInfo()">
            </div>
        </div>

        <!-- บล็อก 2: รายการยา (เปิด/ซ่อนได้) -->
        <div class="glass-card rounded-[2rem] p-6 border-l-4 border-teal-500 space-y-4">
            <button onclick="toggleSection('medListArea', 'medToggleIcon')" class="flex justify-between items-center w-full text-sm font-bold text-teal-300 uppercase italic">
                <span><i class="fa-solid fa-pills mr-1"></i> รายการยาปัจจุบัน</span>
                <i id="medToggleIcon" class="fa-solid fa-chevron-down text-[10px]"></i>
            </button>
            <div id="medListArea" class="hidden space-y-3">
                <div class="flex gap-2">
                    <button onclick="addMedManual()" class="flex-1 bg-teal-500/10 text-teal-400 py-2 rounded-xl text-[10px] border border-teal-500/30 font-bold">+ เพิ่มยา</button>
                    <button onclick="document.getElementById('cameraInput').click()" class="flex-1 btn-gradient text-white py-2 rounded-xl text-[10px] font-bold italic">สแกนซองยา</button>
                    <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden" onchange="processImage(this)">
                </div>
                <div id="ocrStatus" class="hidden text-center py-4 bg-slate-800/50 rounded-2xl border border-teal-500/20">
                    <div id="confirmZone" class="space-y-3 p-3">
                        <input type="text" id="tempMedName" class="input-comorbidity text-center font-bold text-sm">
                        <button onclick="confirmMed()" class="w-full btn-gradient py-2 rounded-xl text-xs font-bold">ยืนยันยานี้</button>
                    </div>
                </div>
                <div id="medDisplayArea" class="space-y-2"></div>
            </div>
        </div>

        <!-- บล็อก 3: สถิติ/กราฟ (เปิด/ซ่อนได้) -->
        <div class="glass-card rounded-[2rem] p-5 border-l-4 border-cyan-500">
            <button onclick="toggleSection('graphSection', 'graphIcon')" class="w-full flex justify-between items-center text-teal-300 font-bold text-xs uppercase tracking-widest">
                <span><i class="fa-solid fa-chart-line mr-2"></i> สถิติแนวโน้ม (Trend Chart)</span>
                <i id="graphIcon" class="fa-solid fa-chevron-down transition-transform duration-300"></i>
            </button>
            <div id="graphSection" class="hidden mt-6 space-y-4">
                <div class="h-48 w-full"><canvas id="bpChart"></canvas></div>
                <div class="grid grid-cols-2 gap-2 text-[9px] border-t border-slate-700/50 pt-3">
                    <span class="flex items-center gap-2"><i class="fa-solid fa-circle text-red-500"></i> รพ.</span>
                    <span class="flex items-center gap-2"><i class="fa-solid fa-circle text-[#4ade80]"></i> เช้า</span>
                    <span class="flex items-center gap-2"><i class="fa-solid fa-circle text-[#facc15]"></i> เย็น</span>
                    <span class="flex items-center gap-2 font-bold text-cyan-400">--- เป้าหมาย 135</span>
                </div>
            </div>
        </div>

        <!-- บล็อก 4: บันทึกความดันเฉลี่ย (เปิด/ซ่อนได้) -->
        <div class="glass-card rounded-[2rem] p-6 border-l-4 border-teal-500 space-y-5">
            <button onclick="toggleSection('bpResultSection', 'bpResultIcon')" class="w-full flex justify-between items-center text-teal-300 font-bold text-xs uppercase tracking-widest">
                <span><i class="fa-solid fa-heart-pulse mr-2"></i> บันทึก & ผลความดันเฉลี่ย</span>
                <i id="bpResultIcon" class="fa-solid fa-chevron-down transition-transform duration-300"></i>
            </button>
            <div id="bpResultSection" class="hidden space-y-5 pt-2">
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-slate-800/80 p-3 rounded-2xl text-center border border-teal-500/10">
                        <p class="text-[9px] text-slate-400 uppercase font-bold">เฉลี่ยเช้า (7 วัน)</p>
                        <p id="avgM" class="text-lg font-bold text-teal-400">--/--</p>
                    </div>
                    <div class="bg-slate-800/80 p-3 rounded-2xl text-center border border-yellow-500/10">
                        <p class="text-[9px] text-slate-400 uppercase font-bold">เฉลี่ยเย็น (7 วัน)</p>
                        <p id="avgE" class="text-lg font-bold text-yellow-400">--/--</p>
                    </div>
                </div>
                <div class="flex gap-2 p-1 bg-slate-900/80 rounded-2xl">
                    <button onclick="setPeriod('morning')" id="btnM" class="flex-1 py-2 rounded-xl bg-teal-600 text-white text-[10px] font-bold">เช้า</button>
                    <button onclick="setPeriod('evening')" id="btnE" class="flex-1 py-2 rounded-xl text-slate-400 text-[10px] font-bold">เย็น</button>
                    <button onclick="setPeriod('hospital')" id="btnH" class="flex-1 py-2 rounded-xl text-slate-400 text-[10px] font-bold">รพ.</button>
                </div>
                <div class="flex gap-3">
                    <input type="number" id="sysIn" placeholder="SYS" class="w-1/2 bg-slate-950 border border-slate-700 rounded-2xl p-4 text-center text-2xl font-bold text-white outline-none">
                    <input type="number" id="diaIn" placeholder="DIA" class="w-1/2 bg-slate-950 border border-slate-700 rounded-2xl p-4 text-center text-2xl font-bold text-white outline-none">
                </div>
                <button onclick="addRecord()" class="w-full btn-gradient p-4 rounded-2xl text-sm font-bold shadow-xl uppercase">บันทึกข้อมูล</button>
            </div>
        </div>

        <!-- บล็อก 5: ผลความดันทั้งหมด (ประวัติย้อนหลัง) -->
        <div class="glass-card rounded-[2rem] p-6 border-l-4 border-slate-500 space-y-4">
            <button onclick="toggleSection('historyArea', 'historyToggleIcon')" class="flex justify-between items-center w-full text-sm font-bold text-slate-300 uppercase italic">
                <span><i class="fa-solid fa-clock-rotate-left mr-1"></i> ผลความดันทั้งหมด</span>
                <i id="historyToggleIcon" class="fa-solid fa-chevron-down text-[10px]"></i>
            </button>
            <div id="historyArea" class="hidden space-y-2 max-h-60 overflow-y-auto pr-1">
                <!-- รายการประวัติจะแสดงที่นี่ -->
            </div>
        </div>

        <!-- Footer เครดิตผู้พัฒนา -->
        <div class="text-center py-6">
            <p class="text-[10px] text-teal-500 font-bold uppercase tracking-widest italic">Designed & Developed By</p>
            <p class="text-sm text-white mt-1 font-bold">Khemika Pongsri (เขมิกา พงษ์ศรี)</p>
            <p class="text-[9px] text-slate-500 italic">OPD โรงพยาบาลตาคลี จ.นครสวรรค์</p>
        </div>
    </div>

    <script>
        let db = { hospital: [], home_m: [], home_e: [], info: { hn: "", name: "", com: "", alr: "", meds: [] } };
        let currentP = 'morning';
        let myChart;

        function initApp() {
            const saved = localStorage.getItem('HT_V20_MASTER');
            if(saved) db = JSON.parse(saved);
            document.getElementById('patientHN').value = db.info.hn || "";
            document.getElementById('patientName').value = db.info.name || "";
            document.getElementById('comorbidity').value = db.info.com || "";
            document.getElementById('allergyInput').value = db.info.alr || "";
            renderMeds();
            renderHistory();
            updateUI();
        }

        function toggleSection(sectionId, iconId) {
            const sec = document.getElementById(sectionId);
            const icon = document.getElementById(iconId);
            const isHidden = sec.classList.toggle('hidden');
            if (icon) icon.style.transform = isHidden ? "rotate(0deg)" : "rotate(180deg)";
            if (sectionId === 'graphSection' && !isHidden) setTimeout(renderChart, 100);
        }

        async function processImage(input) {
            if (!input.files || !input.files[0]) return;
            const status = document.getElementById('ocrStatus');
            status.classList.remove('hidden');
            try {
                const result = await Tesseract.recognize(input.files[0], 'eng+tha');
                document.getElementById('tempMedName').value = result.data.text.split('\n')[0] || "ระบุชื่อยา";
            } catch (e) { alert("สแกนขัดข้องค่ะ"); }
        }

        function confirmMed() {
            db.info.meds.push({ id: Date.now(), n: document.getElementById('tempMedName').value, r: "0" });
            document.getElementById('ocrStatus').classList.add('hidden');
            saveMed();
        }

        function addMedManual() {
            const n = prompt("พิมพ์ชื่อยาและขนาด:");
            if(n) { db.info.meds.push({ id: Date.now(), n: n, r: "0" }); saveMed(); }
        }

        function saveMed() { localStorage.setItem('HT_V20_MASTER', JSON.stringify(db)); renderMeds(); }

        function renderMeds() {
            const list = document.getElementById('medDisplayArea');
            list.innerHTML = db.info.meds.map((m, i) => `
                <div class="bg-slate-900/40 p-3 rounded-2xl border border-teal-500/10 flex justify-between items-center">
                    <div class="flex-1">
                        <p class="text-xs text-teal-300 font-bold">${i+1}. ${m.n}</p>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="text-[9px] text-slate-500">คงเหลือ:</span>
                            <input type="number" value="${m.r}" onchange="updateRem(${m.id}, this.value)" class="w-12 bg-slate-900 border border-slate-700 rounded text-center text-xs text-orange-400 font-bold outline-none">
                            <span class="text-[9px] text-slate-500">เม็ด</span>
                        </div>
                    </div>
                    <button onclick="delMed(${m.id})" class="text-red-400 p-2"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `).join('');
        }

        function updateRem(id, val) { const m = db.info.meds.find(x => x.id === id); if(m) { m.r = val; saveMed(); } }
        function delMed(id) { if(confirm("ลบรายการยา?")) { db.info.meds = db.info.meds.filter(x => x.id !== id); saveMed(); } }

        function setPeriod(p) {
            currentP = p;
            document.querySelectorAll('#btnM, #btnE, #btnH').forEach(b => b.className = "flex-1 py-2 rounded-xl text-slate-400 text-[10px] font-bold");
            const activeId = p === 'morning' ? 'btnM' : (p === 'evening' ? 'btnE' : 'btnH');
            const color = p === 'hospital' ? 'bg-red-600 shadow-md' : 'bg-teal-600 shadow-md';
            document.getElementById(activeId).className = `flex-1 py-2 rounded-xl ${color} text-white text-[10px] font-bold shadow-md`;
        }

        function addRecord() {
            const s = document.getElementById('sysIn').value, d = document.getElementById('diaIn').value;
            if(s && d) {
                const entry = { id: Date.now(), s: parseInt(s), d: parseInt(d), date: new Date().toLocaleDateString('th-TH'), t: currentP };
                if(currentP === 'morning') db.home_m.push(entry);
                else if(currentP === 'evening') db.home_e.push(entry);
                else db.hospital.push(entry);
                localStorage.setItem('HT_V20_MASTER', JSON.stringify(db));
                updateUI(); renderHistory();
                document.getElementById('sysIn').value = ''; document.getElementById('diaIn').value = '';
                alert("บันทึกสำเร็จค่ะ");
            }
        }

        function renderHistory() {
            const area = document.getElementById('historyArea');
            const all = [...db.hospital.map(x=>({...x, lbl:'รพ.', c:'text-red-400'})), ...db.home_m.map(x=>({...x, lbl:'เช้า', c:'text-green-400'})), ...db.home_e.map(x=>({...x, lbl:'เย็น', c:'text-yellow-400'}))].sort((a,b)=>b.id-a.id);
            area.innerHTML = all.map(i => `<div class="flex justify-between items-center bg-slate-900/30 p-2 rounded-xl border border-slate-700/50"><span class="text-[10px] font-bold ${i.c}">${i.lbl} [${i.date}]</span><b class="text-xs">${i.s}/${i.d}</b></div>`).join('') || '<p class="text-center text-[10px] text-slate-500">ไม่มีข้อมูลประวัติ</p>';
        }

        function saveInfo() {
            db.info.hn = document.getElementById('patientHN').value;
            db.info.name = document.getElementById('patientName').value;
            db.info.com = document.getElementById('comorbidity').value;
            db.info.alr = document.getElementById('allergyInput').value;
            localStorage.setItem('HT_V20_MASTER', JSON.stringify(db));
        }

        function updateUI() {
            const calc = (arr) => {
                const last7 = arr.slice(-7);
                if(!last7.length) return "--/--";
                return Math.round(last7.reduce((a,b)=>a+b.s,0)/last7.length) + "/" + Math.round(last7.reduce((a,b)=>a+b.d,0)/last7.length);
            };
            document.getElementById('avgM').innerText = calc(db.home_m);
            document.getElementById('avgE').innerText = calc(db.home_e);
            if(!document.getElementById('graphSection').classList.contains('hidden')) renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('bpChart').getContext('2d');
            if(myChart) myChart.destroy();
            let labels = [...new Set([...db.hospital, ...db.home_m, ...db.home_e].map(x => x.date))].sort().slice(-7);
            if(!labels.length) labels = [new Date().toLocaleDateString('th-TH')];
            const getV = (arr, d) => { const f = arr.filter(x => x.date === d); return f.length ? f.reduce((a,b)=>a+b.s,0)/f.length : null; };
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'เป้าหมาย', data: Array(labels.length).fill(135), borderColor: '#22d3ee', borderDash: [5, 5], pointRadius: 0, fill: false },
                        { label: 'รพ.', data: labels.map(l => getV(db.hospital, l)), borderColor: '#ef4444', backgroundColor: '#ef4444', pointStyle: 'rectRot', radius: 7, spanGaps: true },
                        { label: 'เช้า', data: labels.map(l => getV(db.home_m, l)), borderColor: '#4ade80', backgroundColor: '#4ade80', tension: 0.3, spanGaps: true },
                        { label: 'เย็น', data: labels.map(l => getV(db.home_e, l)), borderColor: '#facc15', backgroundColor: '#facc15', tension: 0.3, spanGaps: true }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 90, max: 190, ticks: { size: 10, color: '#94a3b8' } }, x: { ticks: { size: 9, color: '#94a3b8' } } } }
            });
        }
    </script>
</body>
</html>
